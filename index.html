<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Pedidos</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:20px}
input,button{padding:8px;margin:5px;width:100%}
.card{background:#222;padding:10px;margin:10px 0;border-radius:6px}
.hidden{display:none}
</style>

</head>
<body>

<h2>Sistema de Pedidos</h2>

<div id="loginArea">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="registrar()">Cadastrar</button>
<button onclick="login()">Entrar</button>
</div>

<div id="painel" class="hidden"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, onSnapshot, updateDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let roleGlobal = null;

/* ================= CADASTRO ================= */

window.registrar = async function(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const cred = await createUserWithEmailAndPassword(auth,email,senha);

    const usersSnap = await getDocs(collection(db,"users"));
    const role = usersSnap.empty ? "admin" : "cliente";

    await setDoc(doc(db,"users",cred.user.uid),{
      email,
      role
    });

    alert("Conta criada como: " + role);

  }catch(e){
    alert(e.message);
  }
}

/* ================= LOGIN ================= */

window.login = async function(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    await signInWithEmailAndPassword(auth,email,senha);
  }catch(e){
    alert(e.message);
  }
}

/* ================= AUTH ================= */

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.getElementById("loginArea").classList.remove("hidden");
    document.getElementById("painel").classList.add("hidden");
    return;
  }

  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("painel").classList.remove("hidden");

  const snap = await getDoc(doc(db,"users",user.uid));
  roleGlobal = snap.data().role;

  if(roleGlobal==="admin"){
    renderAdmin();
  }else{
    renderCliente();
  }
});

/* ================= ADMIN ================= */

function renderAdmin(){
document.getElementById("painel").innerHTML=`
<h3>Painel ADMIN</h3>

<input id="nomeProd" placeholder="Nome produto">
<input id="valorProd" placeholder="Valor">
<button onclick="addProduto()">Adicionar Produto</button>

<h4>Produtos</h4>
<div id="listaProdutos"></div>

<h4>Pedidos</h4>
<div id="listaPedidos"></div>

<button onclick="logout()">Sair</button>
`;

carregarProdutosAdmin();
carregarPedidosAdmin();
}

window.addProduto = async function(){
await addDoc(collection(db,"products"),{
nome:nomeProd.value,
valor:valorProd.value
});
alert("Produto adicionado");
}

function carregarProdutosAdmin(){
onSnapshot(collection(db,"products"),snap=>{
listaProdutos.innerHTML="";
snap.forEach(docu=>{
let p = docu.data();
listaProdutos.innerHTML+=`
<div class="card">
${p.nome} - R$${p.valor}
</div>`;
});
});
}

function carregarPedidosAdmin(){
onSnapshot(collection(db,"orders"),snap=>{
listaPedidos.innerHTML="";
snap.forEach(docu=>{
let o = docu.data();
listaPedidos.innerHTML+=`
<div class="card">
Pedido - Status: ${o.status}
<button onclick="mudarStatus('${docu.id}','confirmado')">Confirmar</button>
<button onclick="mudarStatus('${docu.id}','concluido')">Concluir</button>
</div>`;
});
});
}

window.mudarStatus = async function(id,status){
await updateDoc(doc(db,"orders",id),{status});
}

window.logout = function(){
signOut(auth);
}

/* ================= CLIENTE ================= */

function renderCliente(){
document.getElementById("painel").innerHTML=`
<h3>Painel Cliente</h3>

<div id="produtosCliente"></div>

<h4>Meus Pedidos</h4>
<div id="meusPedidos"></div>

<button onclick="logout()">Sair</button>
`;

carregarProdutosCliente();
carregarPedidosCliente();
}

function carregarProdutosCliente(){
onSnapshot(collection(db,"products"),snap=>{
produtosCliente.innerHTML="";
snap.forEach(docu=>{
let p = docu.data();
produtosCliente.innerHTML+=`
<div class="card">
${p.nome} - R$${p.valor}
<button onclick="fazerPedido()">Comprar</button>
</div>`;
});
});
}

window.fazerPedido = async function(){
await addDoc(collection(db,"orders"),{
user:auth.currentUser.uid,
status:"pendente"
});
alert("Pedido enviado");
}

function carregarPedidosCliente(){
onSnapshot(collection(db,"orders"),snap=>{
meusPedidos.innerHTML="";
snap.forEach(docu=>{
let o = docu.data();
if(o.user===auth.currentUser.uid){
meusPedidos.innerHTML+=`
<div class="card">
Status: ${o.status}
</div>`;
}
});
});
}

</script>

</body>
</html>
