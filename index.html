<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery Grátis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded hover:bg-red-700 transition">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded hover:bg-gray-300 transition">Criar Nova Conta</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
                <div id="cliente-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 gap-3 mb-6"></div>
                    
                    <div class="border-t-2 border-dashed pt-4 mt-6">
                        <h3 class="font-bold text-lg mb-2">🛒 Seu Carrinho</h3>
                        <div id="itens-carrinho" class="text-sm text-gray-600 mb-2 space-y-1">Nenhum item adicionado.</div>
                        <div class="text-xl font-bold text-red-600 mb-4">Total: R$ <span id="valor-total">0.00</span></div>

                        <h3 class="font-bold text-lg mb-2">📍 Entrega</h3>
                        <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full border p-2 rounded mb-2">
                            <option value="Sim">Preciso de Entrega (Sim)</option>
                            <option value="Não">Vou buscar no local (Não)</option>
                        </select>
                        
                        <div id="campos-endereco" class="space-y-2">
                            <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full border p-2 rounded">
                            <input id="rua" type="text" placeholder="Rua / Bairro" class="w-full border p-2 rounded bg-gray-50">
                            <input id="num" type="text" placeholder="Número" class="w-full border p-2 rounded">
                        </div>

                        <button onclick="enviarPedidoFinal()" class="w-full bg-green-600 text-white p-4 rounded-lg font-bold mt-4 shadow-lg hover:bg-green-700 transition">FINALIZAR PEDIDO</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Gerenciar Cardápio</h3>
                    <div class="bg-gray-50 p-4 rounded mb-6 border">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <input id="prod-nome" type="text" placeholder="Nome do Produto" class="border p-2 rounded">
                            <input id="prod-preco" type="number" placeholder="Preço" class="border p-2 rounded">
                        </div>
                        <button onclick="salvarProduto()" class="mt-2 w-full bg-green-600 text-white p-2 rounded font-bold">Salvar Produto</button>
                    </div>
                    <div id="admin-cardapio-lista" class="space-y-2 mb-8 text-sm"></div>

                    <h3 class="text-xl font-bold mb-4 border-t pt-4">Painel de Pedidos</h3>
                    <div id="lista-pedidos" class="space-y-3 text-sm"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[500px]">
                <h3 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">Suporte / Chat</h3>
                <div id="chat-box" class="flex-1 p-2 mb-4 bg-gray-50 rounded"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Digite..." class="flex-1 border p-2 rounded focus:outline-none">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded">Enviar</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // VARIÁVEIS DO CARRINHO
        let carrinhoItens = [];
        let totalPedido = 0;

        // --- AUTH ---
        window.logar = () => {
            signInWithEmailAndPassword(auth, email.value, senha.value).catch(() => alert("Erro no Login"));
        };
        window.cadastrar = () => {
            createUserWithEmailAndPassword(auth, email.value, senha.value).then(() => alert("Criado!")).catch(e => alert(e.message));
        };
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                auth_screen.classList.add('hidden');
                main_screen.classList.remove('hidden');
                user_welcome.innerText = `Usuário: ${user.email}`;
                const isAdmin = user.email.includes('admin');
                admin_view.classList.toggle('hidden', !isAdmin);
                cliente_view.classList.toggle('hidden', isAdmin);
                ouvirCardapio(isAdmin);
                if(isAdmin) carregarPedidosAdmin();
                ouvirChat();
            } else {
                auth_screen.classList.remove('hidden');
                main_screen.classList.add('hidden');
            }
        });

        // --- GESTÃO CARDÁPIO ---
        window.salvarProduto = async () => {
            const n = document.getElementById('prod-nome').value;
            const p = document.getElementById('prod-preco').value;
            if(!n || !p) return;
            await setDoc(doc(db, "produtos", n), { nome: n, preco: parseFloat(p), ativo: true });
        };

        function ouvirCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const listaC = document.getElementById('cardapio-lista');
                const listaA = document.getElementById('admin-cardapio-lista');
                listaC.innerHTML = ""; listaA.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    if(isAdmin) {
                        listaA.innerHTML += `<div class="p-2 border rounded flex justify-between bg-white items-center">
                            <span>${p.nome} - R$ ${p.preco}</span>
                            <button onclick="excluirProduto('${d.id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Excluir</button>
                        </div>`;
                    }
                    if(p.ativo) {
                        listaC.innerHTML += `<div class="p-4 border rounded bg-white flex justify-between items-center shadow-sm">
                            <div><p class="font-bold">${p.nome}</p><p class="text-green-600">R$ ${p.preco.toFixed(2)}</p></div>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qtd-${d.id}" value="1" min="1" class="w-12 border p-1 rounded text-center">
                                <button onclick="adicionarAoCarrinho('${p.nome}', ${p.preco}, '${d.id}')" class="bg-red-600 text-white px-3 py-1 rounded font-bold text-xs">+ ADD</button>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        window.excluirProduto = async (id) => deleteDoc(doc(db, "produtos", id));

        // --- LOGICA DO CARRINHO (SOMA) ---
        window.adicionarAoCarrinho = (nome, preco, id) => {
            const qtd = parseInt(document.getElementById(`qtd-${id}`).value);
            const subtotal = preco * qtd;
            
            carrinhoItens.push({ nome, qtd, subtotal });
            atualizarInterfaceCarrinho();
        };

        function atualizarInterfaceCarrinho() {
            const div = document.getElementById('itens-carrinho');
            totalPedido = 0;
            
            if(carrinhoItens.length === 0) {
                div.innerText = "Nenhum item adicionado.";
                document.getElementById('valor-total').innerText = "0.00";
                return;
            }

            div.innerHTML = "";
            carrinhoItens.forEach((item, index) => {
                totalPedido += item.subtotal;
                div.innerHTML += `<div class="flex justify-between border-b py-1">
                    <span>${item.qtd}x ${item.nome}</span>
                    <span>R$ ${item.subtotal.toFixed(2)}</span>
                </div>`;
            });
            
            document.getElementById('valor-total').innerText = totalPedido.toFixed(2);
        }

        // --- ENDEREÇO E ENVIO ---
        window.toggleEndereco = () => {
            document.getElementById('campos-endereco').classList.toggle('hidden', opcao_entrega.value === "Não");
        };

        window.buscarCEP = async () => {
            const val = cep.value.replace(/\D/g, '');
            if(val.length !== 8) return;
            const res = await fetch(`https://viacep.com.br/ws/${val}/json/`);
            const data = await res.json();
            if(!data.erro) rua.value = `${data.logradouro}, ${data.bairro}`;
        };

        window.enviarPedidoFinal = async () => {
            if(carrinhoItens.length === 0) return alert("Seu carrinho está vazio!");
            
            let entregaInfo = "Retirada no Local";
            if(opcao_entrega.value === "Sim") {
                if(!rua.value || !num.value) return alert("Preencha o endereço!");
                entregaInfo = `${rua.value}, nº ${num.value}`;
            }

            const resumoTexto = carrinhoItens.map(i => `${i.qtd}x ${i.nome}`).join(", ");

            await addDoc(collection(db, "pedidos"), {
                cliente: auth.currentUser.email,
                item: resumoTexto,
                total: totalPedido.toFixed(2),
                entrega: entregaInfo,
                data: serverTimestamp()
            });

            alert("Pedido Enviado!");
            carrinhoItens = [];
            atualizarInterfaceCarrinho();
        };

        function carregarPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                lista_pedidos.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    lista_pedidos.innerHTML += `<div class="p-3 bg-white border-l-4 border-red-500 rounded shadow-sm">
                        <p><b>Cliente:</b> ${p.cliente.split('@')[0]} | <b>R$ ${p.total}</b></p>
                        <p class="text-gray-700">${p.item}</p>
                        <p class="text-xs text-red-600">📍 ${p.entrega}</p>
                    </div>`;
                });
            });
        }

        // --- CHAT ---
        window.enviarMensagem = async () => {
            if(!chat_input.value.trim()) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: chat_input.value, hora: serverTimestamp() });
            chat_input.value = "";
        };

        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                chat_box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const classe = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    chat_box.innerHTML += `<div class="msg ${classe}"><b>${m.usuario.split('@')[0]}:</b> ${m.texto}</div>`;
                });
                chat_box.scrollTop = chat_box.scrollHeight;
            });
        }
    </script>
</body>
</html>
