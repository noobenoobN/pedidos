<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
        .status-pendente { color: #dc2626; font-weight: bold; }
        .status-preparando { color: #d97706; font-weight: bold; }
        .status-caminho { color: #2563eb; font-weight: bold; }
        .status-entregue { color: #16a34a; font-weight: bold; }
        .status-cancelado { color: #7f1d1d; font-weight: bold; text-decoration: line-through; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded hover:bg-red-700 transition">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded hover:bg-gray-300 transition">Criar Nova Conta</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
                <div id="cliente-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 gap-3 mb-6"></div>
                    
                    <div class="border-t pt-4 space-y-3">
                        <h3 class="font-bold text-lg text-red-600 italic">Meus Pedidos</h3>
                        <div id="meus-pedidos-status" class="bg-white border rounded p-3 text-sm space-y-2 mb-4 shadow-inner min-h-[50px]">
                            Nenhum pedido em andamento.
                        </div>

                        <h3 class="font-bold text-lg">Novo Pedido</h3>
                        <div class="bg-gray-50 p-3 rounded border text-sm mb-2">
                            <p class="font-bold mb-1 border-b pb-1">Carrinho:</p>
                            <div id="lista-carrinho" class="space-y-1 mb-2 italic text-gray-600">Vazio</div>
                        </div>

                        <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full border p-2 rounded">
                            <option value="Sim">Preciso de Entrega</option>
                            <option value="Não">Vou buscar</option>
                        </select>
                        <div id="campos-endereco" class="space-y-2">
                            <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full border p-2 rounded">
                            <input id="rua" type="text" placeholder="Rua" class="w-full border p-2 rounded bg-gray-50">
                            <input id="num" type="text" placeholder="Número" class="w-full border p-2 rounded">
                        </div>
                        <div class="bg-yellow-50 p-3 rounded border border-yellow-200 text-sm">
                            <b>Total:</b> <span id="resumo-carrinho">R$ 0.00</span>
                        </div>
                        <button onclick="enviarPedidoCompleto()" class="w-full bg-green-600 text-white p-3 rounded font-bold uppercase hover:bg-green-700 transition">Enviar Pedido</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Admin - Cardápio</h3>
                    <div class="bg-gray-50 p-4 rounded mb-6 border flex gap-2">
                        <input id="prod-nome" type="text" placeholder="Produto" class="border p-2 rounded w-full">
                        <input id="prod-preco" type="number" placeholder="Preço" class="border p-2 rounded w-32">
                        <button onclick="salvarProduto()" class="bg-green-600 text-white px-4 rounded font-bold">Salvar</button>
                    </div>
                    <div id="admin-cardapio-lista" class="space-y-2 mb-8 text-sm"></div>

                    <h3 class="text-xl font-bold mb-4 border-t pt-4 text-red-600">Painel de Pedidos</h3>
                    <div id="lista-pedidos" class="space-y-3 text-sm"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[500px]">
                <h3 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">Chat Suporte</h3>
                <div id="chat-box" class="flex-1 p-2 mb-4 bg-gray-50 rounded"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Digite..." class="flex-1 border p-2 rounded focus:outline-none">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded">Enviar</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let carrinho = [];
        let totalAcumulado = 0;

        // AUTH
        window.cadastrar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, e, s).catch(err => alert(err.message));
        };
        window.logar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro no Login"));
        };
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = user.email;
                const isAdmin = user.email.includes('admin');
                if(isAdmin) {
                    document.getElementById('admin-view').classList.remove('hidden');
                    document.getElementById('cliente-view').classList.add('hidden');
                    carregarPedidosAdmin();
                    ouvirCardapio(true);
                } else {
                    document.getElementById('cliente-view').classList.remove('hidden');
                    document.getElementById('admin-view').classList.add('hidden');
                    ouvirCardapio(false);
                    ouvirStatusCliente();
                }
                ouvirChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        // CARDÁPIO
        window.salvarProduto = async () => {
            const nome = document.getElementById('prod-nome').value;
            const preco = document.getElementById('prod-preco').value;
            if(!nome || !preco) return;
            await setDoc(doc(db, "produtos", nome), { nome, preco: parseFloat(preco), ativo: true });
        };

        function ouvirCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                const listaC = document.getElementById('cardapio-lista');
                const listaA = document.getElementById('admin-cardapio-lista');
                listaC.innerHTML = ""; listaA.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    if(isAdmin) {
                        listaA.innerHTML += `<div class="p-2 border rounded flex justify-between bg-white">
                            <span>${p.nome} - R$ ${p.preco}</span>
                            <button onclick="deleteDoc(doc(db, 'produtos', '${docSnap.id}'))" class="text-red-500">Excluir</button>
                        </div>`;
                    }
                    if(p.ativo) {
                        listaC.innerHTML += `<div class="p-3 border rounded bg-white flex justify-between items-center shadow-sm">
                            <span class="font-bold">${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                            <button onclick="selecionarItem('${p.nome}', ${p.preco})" class="bg-red-600 text-white px-3 py-1 rounded text-sm font-bold">ADD</button>
                        </div>`;
                    }
                });
            });
        }

        // PEDIDOS
        window.selecionarItem = (nome, preco) => {
            carrinho.push({ nome, subtotal: preco });
            atualizarCarrinhoVisual();
        };

        function atualizarCarrinhoVisual() {
            const listaDiv = document.getElementById('lista-carrinho');
            const resumoDiv = document.getElementById('resumo-carrinho');
            if (carrinho.length === 0) {
                listaDiv.innerHTML = "Vazio";
                resumoDiv.innerText = "R$ 0.00";
                return;
            }
            listaDiv.innerHTML = ""; totalAcumulado = 0;
            carrinho.forEach(item => {
                totalAcumulado += item.subtotal;
                listaDiv.innerHTML += `<div>• ${item.nome}</div>`;
            });
            resumoDiv.innerText = `R$ ${totalAcumulado.toFixed(2)}`;
        }

        window.enviarPedidoCompleto = async () => {
            if(carrinho.length === 0) return alert("Carrinho vazio!");
            await addDoc(collection(db, "pedidos"), {
                cliente: auth.currentUser.email,
                item: carrinho.map(i => i.nome).join(", "),
                total: totalAcumulado.toFixed(2),
                status: "Pendente",
                motivoCancelamento: "",
                data: serverTimestamp()
            });
            carrinho = []; atualizarCarrinhoVisual();
            alert("Pedido Enviado!");
        };

        // FUNÇÃO DE MUDAR STATUS E CANCELAR
        window.mudarStatus = async (id, novoStatus) => {
            if (novoStatus === 'Cancelado') {
                const motivo = prompt("Digite o motivo do cancelamento para o cliente:");
                if (!motivo) return alert("É obrigatório informar o motivo!");
                await updateDoc(doc(db, "pedidos", id), { status: novoStatus, motivoCancelamento: motivo });
            } else {
                await updateDoc(doc(db, "pedidos", id), { status: novoStatus });
            }
        };

        function carregarPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    lista.innerHTML += `
                        <div class="p-3 bg-white border-l-4 border-red-500 rounded shadow flex flex-col gap-2">
                            <div class="flex justify-between">
                                <span><b>${p.cliente.split('@')[0]}:</b> ${p.item}</span>
                                <span class="text-xs font-bold uppercase">${p.status}</span>
                            </div>
                            <div class="grid grid-cols-4 gap-1">
                                <button onclick="mudarStatus('${d.id}', 'Preparando')" class="bg-orange-400 text-white p-1 rounded text-[10px]">PREPARAR</button>
                                <button onclick="mudarStatus('${d.id}', 'A Caminho')" class="bg-blue-500 text-white p-1 rounded text-[10px]">CAMINHO</button>
                                <button onclick="mudarStatus('${d.id}', 'Entregue')" class="bg-green-600 text-white p-1 rounded text-[10px]">OK</button>
                                <button onclick="mudarStatus('${d.id}', 'Cancelado')" class="bg-black text-white p-1 rounded text-[10px]">CANCELAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        function ouvirStatusCliente() {
            const q = query(collection(db, "pedidos"), where("cliente", "==", auth.currentUser.email), orderBy("data", "desc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('meus-pedidos-status');
                box.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    let statusHtml = `<span class="status-${p.status.toLowerCase()}">${p.status}</span>`;
                    let motivoHtml = p.status === 'Cancelado' ? `<p class="text-[10px] text-red-800 bg-red-50 p-1 mt-1 rounded">Motivo: ${p.motivoCancelamento}</p>` : '';
                    
                    box.innerHTML += `
                        <div class="border-b py-2">
                            <div class="flex justify-between items-center">
                                <span class="text-gray-600">${p.item.substring(0, 25)}...</span>
                                ${statusHtml}
                            </div>
                            ${motivoHtml}
                        </div>`;
                });
            });
        }

        // CHAT (simplificado para o exemplo)
        window.enviarMensagem = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: input.value, hora: serverTimestamp() });
            input.value = "";
        };
        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const cl = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    box.innerHTML += `<div class="msg ${cl}"><p class="text-[10px] font-bold">${m.usuario.split('@')[0]}</p><p>${m.texto}</p></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
