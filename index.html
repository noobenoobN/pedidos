<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Delivery - Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script> </head>
<body class="bg-gray-100 p-5">
    <h1 class="text-2xl font-bold text-red-600 mb-5">Cardápio Online</h1>
    
    <div class="grid grid-cols-1 gap-4">
        <div class="bg-white p-4 rounded shadow flex justify-between items-center">
            <div>
                <h2 class="font-bold">X-Burger Especial</h2>
                <p class="text-green-600">R$ 25,00</p>
            </div>
            <button onclick="fazerPedido('X-Burger', 25.00)" class="bg-red-500 text-white px-4 py-2 rounded">Pedir</button>
        </div>

        <div class="bg-white p-4 rounded shadow flex justify-between items-center">
            <div>
                <h2 class="font-bold">Batata Frita G</h2>
                <p class="text-green-600">R$ 15,00</p>
            </div>
            <button onclick="fazerPedido('Batata Frita G', 15.00)" class="bg-red-500 text-white px-4 py-2 rounded">Pedir</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Função global para o botão chamar
        window.fazerPedido = async (nomeItem, preco) => {
            const endereco = prompt("Digite seu endereço:");
            if (!endereco) return;

            try {
                await addDoc(collection(db, "pedidos"), {
                    item: nomeItem,
                    valor: preco,
                    endereco: endereco,
                    status: "pendente",
                    criadoEm: serverTimestamp()
                });
                alert("Pedido enviado! Aguarde a confirmação.");
            } catch (e) {
                alert("Erro ao enviar pedido.");
            }
        };
    </script>
</body>
</html>
