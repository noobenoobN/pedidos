<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini iFood Firebase</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<!-- LOGIN -->
<div id="authBox" class="bg-white p-6 rounded-xl shadow-md w-80">
  <h2 class="text-2xl font-bold text-center mb-4">Login / Cadastro</h2>
  <input id="email" type="email" placeholder="Email" class="w-full p-2 mb-2 border rounded">
  <input id="senha" type="password" placeholder="Senha" class="w-full p-2 mb-3 border rounded">
  <button onclick="login()" class="w-full bg-red-600 text-white p-2 rounded mb-2">Entrar</button>
  <button onclick="cadastrar()" class="w-full bg-green-600 text-white p-2 rounded">Cadastrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden w-full max-w-md bg-white min-h-screen p-4">

  <div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold">Mini iFood 🍔</h1>
    <button onclick="logout()" class="text-red-500">Sair</button>
  </div>

  <!-- CLIENTE -->
  <div id="clienteArea">
    <h2 class="font-bold mb-2">Cardápio</h2>
    <div id="produtos"></div>

    <h2 class="font-bold mt-4">Carrinho</h2>
    <div id="carrinho"></div>
    <p class="mt-2 font-bold">Total: R$ <span id="totalSpan">0.00</span></p>
    <button onclick="enviarPedido()" class="w-full bg-red-600 text-white p-2 rounded mt-2">
      Finalizar Pedido
    </button>

    <h2 class="font-bold mt-6">Meus Pedidos</h2>
    <div id="meusPedidos"></div>
  </div>

  <!-- ADMIN -->
  <div id="adminArea" class="hidden">
    <h2 class="font-bold mb-2">Pedidos Recebidos</h2>
    <div id="adminPedidos"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let carrinho = [];
let total = 0;

const produtosFixos = [
  { nome: "Hambúrguer", preco: 20 },
  { nome: "Pizza", preco: 35 },
  { nome: "Refrigerante", preco: 8 }
];

window.cadastrar = async () => {
  const cred = await createUserWithEmailAndPassword(auth, email.value, senha.value);
  await setDoc(doc(db, "usuarios", cred.user.uid), {
    email: email.value,
    role: "cliente"
  });
  alert("Conta criada!");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, senha.value);
};

window.logout = () => signOut(auth);

function carregarProdutos() {
  produtos.innerHTML = "";
  produtosFixos.forEach(p => {
    produtos.innerHTML += `
      <div class="border p-2 rounded mb-2 flex justify-between">
        ${p.nome} - R$ ${p.preco}
        <button onclick="addCarrinho('${p.nome}', ${p.preco})"
          class="bg-green-500 text-white px-2 rounded">
          +
        </button>
      </div>
    `;
  });
}

window.addCarrinho = (nome, preco) => {
  carrinho.push({ nome, preco });
  total += preco;
  atualizarCarrinho();
};

function atualizarCarrinho() {
  carrinhoDiv.innerHTML = "";
  carrinho.forEach(item => {
    carrinhoDiv.innerHTML += `<div>${item.nome} - R$ ${item.preco}</div>`;
  });
  totalSpan.innerText = total.toFixed(2);
}

window.enviarPedido = async () => {
  if (carrinho.length === 0) return alert("Carrinho vazio");

  await addDoc(collection(db, "pedidos"), {
    usuario: auth.currentUser.email,
    itens: carrinho,
    total: total,
    status: "Recebido",
    criadoEm: new Date()
  });

  carrinho = [];
  total = 0;
  atualizarCarrinho();
  alert("Pedido enviado!");
};

function ouvirPedidosCliente() {
  onSnapshot(collection(db, "pedidos"), snap => {
    meusPedidos.innerHTML = "";
    snap.forEach(docSnap => {
      const p = docSnap.data();
      if (p.usuario === auth.currentUser.email) {

        const listaItens = p.itens
          ? p.itens.map(item => `${item.nome} - R$ ${item.preco}`).join("<br>")
          : "";

        meusPedidos.innerHTML += `
          <div class="border p-3 rounded mb-3">
            ${listaItens}<br><br>
            Total: R$ ${p.total}<br>
            Status: <b>${p.status}</b>
          </div>
        `;
      }
    });
  });
}

function proximoStatus(status) {
  if (status === "Recebido") return "Em preparo";
  if (status === "Em preparo") return "Saiu para entrega";
  if (status === "Saiu para entrega") return "Entregue";
  return "Entregue";
}

window.mudarStatus = async (id, statusAtual) => {
  const ref = doc(db, "pedidos", id);
  await updateDoc(ref, { status: proximoStatus(statusAtual) });
};

function ouvirPedidosAdmin() {
  onSnapshot(collection(db, "pedidos"), snap => {
    adminPedidos.innerHTML = "";
    snap.forEach(docSnap => {
      const p = docSnap.data();

      const listaItens = p.itens
        ? p.itens.map(item => `${item.nome} - R$ ${item.preco}`).join("<br>")
        : "";

      adminPedidos.innerHTML += `
        <div class="border p-3 rounded mb-3">
          <strong>${p.usuario}</strong><br><br>
          ${listaItens}<br><br>
          Total: R$ ${p.total}<br>
          Status: <b>${p.status}</b><br><br>

          <button onclick="mudarStatus('${docSnap.id}', '${p.status}')"
            class="bg-blue-500 text-white px-2 py-1 rounded">
            Avançar Status
          </button>
        </div>
      `;
    });
  });
}

onAuthStateChanged(auth, async user => {
  if (user) {
    authBox.classList.add("hidden");
    app.classList.remove("hidden");

    const userDoc = await getDoc(doc(db, "usuarios", user.uid));
    if (userDoc.data().role === "admin") {
      clienteArea.classList.add("hidden");
      adminArea.classList.remove("hidden");
      ouvirPedidosAdmin();
    } else {
      carregarProdutos();
      ouvirPedidosCliente();
    }
  } else {
    authBox.classList.remove("hidden");
    app.classList.add("hidden");
  }
});
</script>

</body>
</html>
