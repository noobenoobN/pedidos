<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Pedidos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- LOGIN -->
<div id="authBox" class="bg-white p-6 rounded-xl shadow-md w-80">
  <h2 class="text-2xl font-bold text-center mb-4">Login / Cadastro</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full p-2 mb-2 border rounded">

  <input id="senha" type="password" placeholder="Senha"
    class="w-full p-2 mb-3 border rounded">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-2 rounded mb-2">
    Entrar
  </button>

  <button onclick="cadastrar()"
    class="w-full bg-green-600 text-white p-2 rounded">
    Cadastrar
  </button>

  <p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>
</div>

<!-- CLIENTE -->
<div id="clientePanel" class="hidden bg-white p-6 rounded-xl shadow-md w-96">
  <h1 class="text-xl font-bold mb-4">Painel Cliente 🛒</h1>

  <h2 class="font-bold">Produtos</h2>
  <div id="listaProdutos" class="mt-2"></div>

  <button onclick="fazerPedido()"
    class="w-full bg-green-600 text-white p-2 rounded mt-3">
    Fazer Pedido
  </button>

  <h2 class="font-bold mt-6">Meus Pedidos</h2>
  <div id="meusPedidos" class="mt-2"></div>

  <button onclick="logout()"
    class="mt-4 bg-red-500 text-white p-2 rounded w-full">
    Sair
  </button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden bg-white p-6 rounded-xl shadow-md w-96">
  <h1 class="text-xl font-bold mb-4">Painel Admin 👑</h1>

  <h2 class="font-bold">Todos Pedidos</h2>
  <div id="listaPedidos" class="mt-2"></div>

  <button onclick="logout()"
    class="mt-4 bg-red-500 text-white p-2 rounded w-full">
    Sair
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5",
  measurementId: "G-4HLF6VSY2Z"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

window.cadastrar = async function() {
  const cred = await createUserWithEmailAndPassword(auth, email.value, senha.value);

  await setDoc(doc(db, "usuarios", cred.user.uid), {
    email: email.value,
    role: "cliente"
  });

  alert("Conta criada!");
};

window.login = async function() {
  await signInWithEmailAndPassword(auth, email.value, senha.value);
};

window.logout = function() {
  signOut(auth);
};

function carregarProdutos() {
  listaProdutos.innerHTML = `
    <label class="block"><input type="checkbox" value="Maçã - R$2.50"> Maçã - R$2.50</label>
    <label class="block"><input type="checkbox" value="Limão - R$1.30"> Limão - R$1.30</label>
    <label class="block"><input type="checkbox" value="Pera - R$1.50"> Pera - R$1.50</label>
  `;
}

window.fazerPedido = async function() {
  const selecionados = document.querySelectorAll('#listaProdutos input:checked');
  if (selecionados.length === 0) {
    alert("Selecione pelo menos um item");
    return;
  }

  const itens = [];
  selecionados.forEach(i => itens.push(i.value));

  await addDoc(collection(db, "pedidos"), {
    usuario: auth.currentUser.email,
    itens: itens,
    data: new Date()
  });

  alert("Pedido enviado!");
};

function carregarMeusPedidos() {
  onSnapshot(collection(db, "pedidos"), (snapshot) => {
    meusPedidos.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const pedido = docSnap.data();
      if (pedido.usuario === auth.currentUser.email) {
        meusPedidos.innerHTML += `
          <div class="border p-2 rounded mb-2">
            ${pedido.itens.join(", ")}
          </div>
        `;
      }
    });
  });
}

function carregarPedidosAdmin() {
  onSnapshot(collection(db, "pedidos"), (snapshot) => {
    listaPedidos.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const pedido = docSnap.data();
      listaPedidos.innerHTML += `
        <div class="border p-2 rounded mb-2">
          <strong>${pedido.usuario}</strong><br>
          ${pedido.itens.join(", ")}
        </div>
      `;
    });
  });
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docSnap = await getDoc(doc(db, "usuarios", user.uid));

    authBox.classList.add("hidden");

    if (docSnap.exists() && docSnap.data().role === "admin") {
      adminPanel.classList.remove("hidden");
      clientePanel.classList.add("hidden");
      carregarPedidosAdmin();
    } else {
      clientePanel.classList.remove("hidden");
      adminPanel.classList.add("hidden");
      carregarProdutos();
      carregarMeusPedidos();
    }
  } else {
    authBox.classList.remove("hidden");
    adminPanel.classList.add("hidden");
    clientePanel.classList.add("hidden");
  }
});
</script>

</body>
</html>
