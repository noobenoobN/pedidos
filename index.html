<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery Grátis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
        
        /* Cores de Status para o Cliente */
        .status-badge { padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: bold; }
        .status-pendente { background: #fee2e2; color: #dc2626; }
        .status-preparando { background: #fef3c7; color: #d97706; }
        .status-caminho { background: #dbeafe; color: #2563eb; }
        .status-entregue { background: #dcfce7; color: #16a34a; }
        .status-cancelado { background: #f3f4f6; color: #4b5563; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded hover:bg-red-700 transition">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded hover:bg-gray-300 transition">Criar Nova Conta</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
                <div id="cliente-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 gap-3 mb-6"></div>
                    
                    <div class="border-t pt-4 space-y-3">
                        <h3 class="font-bold text-lg text-red-600 italic">Meus Pedidos Ativos</h3>
                        <div id="meus-pedidos-status" class="bg-gray-50 border rounded p-4 text-sm space-y-3 mb-4 shadow-inner min-h-[60px]">
                            Buscando seus pedidos...
                        </div>

                        <h3 class="font-bold text-lg">Finalizar Novo Pedido</h3>
                        <div class="bg-gray-50 p-3 rounded border text-sm mb-2">
                            <p class="font-bold mb-1 border-b pb-1">Carrinho:</p>
                            <div id="lista-carrinho" class="space-y-1 mb-2 italic text-gray-600">Seu carrinho está vazio.</div>
                        </div>

                        <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full border p-2 rounded">
                            <option value="Sim">Preciso de Entrega (Sim)</option>
                            <option value="Não">Vou buscar no local (Não)</option>
                        </select>
                        <div id="campos-endereco" class="space-y-2">
                            <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full border p-2 rounded">
                            <input id="rua" type="text" placeholder="Rua / Endereço" class="w-full border p-2 rounded bg-gray-50">
                            <input id="num" type="text" placeholder="Número" class="w-full border p-2 rounded">
                        </div>
                        <div class="bg-yellow-50 p-3 rounded border border-yellow-200 text-sm font-bold">
                            Total a Pagar: <span id="resumo-carrinho">R$ 0.00</span>
                        </div>
                        <button onclick="enviarPedidoCompleto()" class="w-full bg-green-600 text-white p-3 rounded font-bold uppercase hover:bg-green-700 transition">Confirmar e Enviar</button>
                        <button onclick="limparCarrinho()" class="w-full text-xs text-red-500 underline mt-2">Limpar Carrinho</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4 text-red-600">Painel Administrativo</h3>
                    <div class="bg-gray-50 p-4 rounded mb-6 border">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 font-bold mb-2">Novo Produto:</div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <input id="prod-nome" type="text" placeholder="Ex: Maca" class="border p-2 rounded">
                            <input id="prod-preco" type="number" placeholder="Preço" class="border p-2 rounded">
                        </div>
                        <button onclick="salvarProduto()" class="mt-2 w-full bg-green-600 text-white p-2 rounded font-bold">Salvar no Cardápio</button>
                    </div>
                    <div id="admin-cardapio-lista" class="space-y-2 mb-8 text-sm"></div>

                    <h3 class="text-xl font-bold mb-4 border-t pt-4">Gestão de Pedidos</h3>
                    <div id="lista-pedidos" class="space-y-3 text-sm"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[500px]">
                <h3 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2 text-center">Chat de Suporte</h3>
                <div id="chat-box" class="flex-1 p-2 mb-4 bg-gray-50 rounded shadow-inner"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Dúvida sobre o pedido?" class="flex-1 border p-2 rounded focus:outline-none">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let carrinho = [];
        let totalAcumulado = 0;

        // --- AUTENTICAÇÃO ---
        window.cadastrar = () => {
            const e = document.getElementById('email').value.trim();
            const s = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, e, s).then(() => alert("Conta criada!")).catch(err => alert("Erro: " + err.message));
        };
        window.logar = () => {
            const e = document.getElementById('email').value.trim();
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Login inválido!"));
        };
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = `Olá, ${user.email.split('@')[0]}`;
                
                if(user.email.toLowerCase().includes('admin')) {
                    document.getElementById('admin-view').classList.remove('hidden');
                    document.getElementById('cliente-view').classList.add('hidden');
                    carregarPedidosAdmin();
                    ouvirCardapio(true);
                } else {
                    document.getElementById('cliente-view').classList.remove('hidden');
                    document.getElementById('admin-view').classList.add('hidden');
                    ouvirCardapio(false);
                    ouvirStatusCliente(); // Inicia o rastreio do pedido do cliente
                }
                ouvirChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        // --- CARDÁPIO ---
        window.salvarProduto = async () => {
            const nome = document.getElementById('prod-nome').value.trim();
            const preco = document.getElementById('prod-preco').value;
            if(!nome || !preco) return alert("Preencha nome e preço!");
            await setDoc(doc(db, "produtos", nome.toLowerCase()), { nome: nome, preco: parseFloat(preco), ativo: true });
            document.getElementById('prod-nome').value = "";
            document.getElementById('prod-preco').value = "";
        };

        window.toggleProduto = async (id, statusAtual) => {
            await updateDoc(doc(db, "produtos", id), { ativo: !statusAtual });
        };

        window.excluirProduto = async (id) => {
            if(confirm("Deseja excluir este produto?")) await deleteDoc(doc(db, "produtos", id));
        };

        function ouvirCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                const listaC = document.getElementById('cardapio-lista');
                const listaA = document.getElementById('admin-cardapio-lista');
                if(listaC) listaC.innerHTML = ""; 
                if(listaA) listaA.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    const id = docSnap.id;
                    if(isAdmin && listaA) {
                        listaA.innerHTML += `<div class="flex justify-between items-center p-2 border rounded ${p.ativo ? 'bg-white' : 'bg-gray-200 opacity-60'}">
                            <span>${p.nome} - <b>R$ ${p.preco.toFixed(2)}</b></span>
                            <div class="flex gap-2">
                                <button onclick="toggleProduto('${id}', ${p.ativo})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">${p.ativo ? 'Ocultar' : 'Mostrar'}</button>
                                <button onclick="excluirProduto('${id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Excluir</button>
                            </div>
                        </div>`;
                    }
                    if(p.ativo && listaC) {
                        listaC.innerHTML += `<div class="flex justify-between items-center p-4 border rounded bg-white shadow-sm">
                                <span class="font-bold text-gray-700">${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                                <div class="flex gap-2 items-center">
                                    <input type="number" id="qtd-${id}" value="1" min="1" class="border w-12 p-1 rounded text-center">
                                    <button onclick="selecionarItem('${p.nome}', ${p.preco}, '${id}')" class="bg-red-600 text-white px-3 py-1 rounded font-bold">ADD</button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        // --- CARRINHO (SOMA IGUAIS) ---
        window.selecionarItem = (nome, preco, id) => {
            const qtdInput = parseInt(document.getElementById(`qtd-${id}`).value);
            const index = carrinho.findIndex(item => item.nome === nome);
            
            if (index !== -1) {
                carrinho[index].qtd += qtdInput;
                carrinho[index].subtotal = carrinho[index].qtd * preco;
            } else {
                carrinho.push({ nome, qtd: qtdInput, subtotal: preco * qtdInput });
            }
            atualizarCarrinhoVisual();
        };

        window.limparCarrinho = () => { carrinho = []; atualizarCarrinhoVisual(); };

        function atualizarCarrinhoVisual() {
            const listaDiv = document.getElementById('lista-carrinho');
            const resumoDiv = document.getElementById('resumo-carrinho');
            if (carrinho.length === 0) {
                listaDiv.innerHTML = "Seu carrinho está vazio.";
                resumoDiv.innerText = "R$ 0.00";
                totalAcumulado = 0;
                return;
            }
            listaDiv.innerHTML = ""; totalAcumulado = 0;
            carrinho.forEach(item => {
                totalAcumulado += item.subtotal;
                listaDiv.innerHTML += `<div>• ${item.qtd}x ${item.nome} (R$ ${item.subtotal.toFixed(2)})</div>`;
            });
            resumoDiv.innerText = `R$ ${totalAcumulado.toFixed(2)}`;
        }

        // --- PEDIDOS (ENVIO E STATUS) ---
        window.enviarPedidoCompleto = async () => {
            if(carrinho.length === 0) return alert("Adicione algo!");
            const entrega = document.getElementById('opcao-entrega').value;
            let local = entrega === "Sim" ? `${document.getElementById('rua').value}, ${document.getElementById('num').value}` : "Retirada";
            
            const novoPedido = {
                cliente: auth.currentUser.email.toLowerCase(), // Email sempre em minúsculo
                item: carrinho.map(i => `${i.qtd}x ${i.nome}`).join(", "),
                total: totalAcumulado.toFixed(2),
                entrega: local,
                status: "Pendente",
                motivoCancelamento: "",
                data: serverTimestamp()
            };

            await addDoc(collection(db, "pedidos"), novoPedido);
            alert("Pedido Enviado com Sucesso!");
            limparCarrinho();
        };

        window.mudarStatus = async (id, novoStatus) => {
            let dados = { status: novoStatus };
            if (novoStatus === 'Cancelado') {
                const motivo = prompt("Motivo do cancelamento?");
                if (!motivo) return;
                dados.motivoCancelamento = motivo;
            }
            await updateDoc(doc(db, "pedidos", id), dados);
        };

        function carregarPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const id = d.id;
                    lista.innerHTML += `
                        <div class="p-3 bg-white border-l-4 border-red-500 rounded shadow mb-2">
                            <div class="flex justify-between font-bold">
                                <span>${p.cliente.split('@')[0]}</span>
                                <span class="text-xs uppercase px-2 bg-gray-100 rounded">${p.status}</span>
                            </div>
                            <div class="text-xs text-gray-600 my-1">${p.item}</div>
                            <div class="grid grid-cols-5 gap-1 mt-2">
                                <button onclick="mudarStatus('${id}', 'Confirmado')" class="bg-blue-500 text-white p-1 rounded text-[9px] font-bold">CONFIRMAR</button>
                                <button onclick="mudarStatus('${id}', 'Preparando')" class="bg-orange-500 text-white p-1 rounded text-[9px] font-bold">PREPARAR</button>
                                <button onclick="mudarStatus('${id}', 'A Caminho')" class="bg-purple-500 text-white p-1 rounded text-[9px] font-bold">CAMINHO</button>
                                <button onclick="mudarStatus('${id}', 'Entregue')" class="bg-green-600 text-white p-1 rounded text-[9px] font-bold">FIM</button>
                                <button onclick="mudarStatus('${id}', 'Cancelado')" class="bg-black text-white p-1 rounded text-[9px] font-bold">X</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- CORREÇÃO FINAL: OUVIR STATUS CLIENTE ---
        function ouvirStatusCliente() {
            if (!auth.currentUser) return;
            
            // Filtra exatamente pelo email do cliente logado
            const emailCliente = auth.currentUser.email.toLowerCase();
            const q = query(
                collection(db, "pedidos"), 
                where("cliente", "==", emailCliente), 
                orderBy("data", "desc")
            );
            
            onSnapshot(q, (snap) => {
                const box = document.getElementById('meus-pedidos-status');
                if(!box) return;
                
                if(snap.empty) {
                    box.innerHTML = "Nenhum pedido em andamento.";
                    return;
                }

                box.innerHTML = ""; // Limpa para atualizar
                snap.forEach(d => {
                    const p = d.data();
                    const s = p.status;
                    let cor = s === 'Pendente' ? 'status-pendente' : (s === 'Preparando' ? 'status-preparando' : (s === 'A Caminho' ? 'status-caminho' : (s === 'Cancelado' ? 'status-cancelado' : 'status-entregue')));

                    box.innerHTML += `
                        <div class="bg-white p-3 rounded border shadow-sm flex flex-col gap-1">
                            <div class="flex justify-between items-center">
                                <span class="font-bold text-gray-800">${p.item}</span>
                                <span class="status-badge ${cor}">${s.toUpperCase()}</span>
                            </div>
                            <div class="text-[11px] text-gray-500 font-bold">Total: R$ ${p.total} | Entrega: ${p.entrega}</div>
                            ${p.status === 'Cancelado' ? `<div class="text-[11px] text-red-600 bg-red-50 p-1 rounded"><b>Motivo:</b> ${p.motivoCancelamento}</div>` : ''}
                        </div>`;
                });
            });
        }

        // --- CHAT ---
        window.enviarMensagem = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: input.value, hora: serverTimestamp() });
            input.value = "";
        };

        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const classe = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    box.innerHTML += `<div class="msg ${classe}"><p class="text-[9px] font-bold opacity-50">${m.usuario.split('@')[0]}</p><p class="text-sm">${m.texto}</p></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
