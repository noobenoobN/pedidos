<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery - Versão Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
        .status-pendente { color: #dc2626; font-weight: bold; }
        .status-preparando { color: #d97706; font-weight: bold; }
        .status-caminho { color: #2563eb; font-weight: bold; }
        .status-entregue { color: #16a34a; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded hover:bg-red-700 transition">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded hover:bg-gray-300 transition">Criar Nova Conta</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
                <div id="cliente-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 gap-3 mb-6"></div>
                    
                    <div class="border-t pt-4 space-y-3">
                        <h3 class="font-bold text-lg text-red-600 italic">Meus Pedidos Ativos</h3>
                        <div id="meus-pedidos-status" class="bg-white border rounded p-3 text-sm space-y-2 mb-4 shadow-inner min-h-[50px]">
                            Nenhum pedido em andamento.
                        </div>

                        <h3 class="font-bold text-lg">Finalizar Novo Pedido</h3>
                        <div class="bg-gray-50 p-3 rounded border text-sm mb-2">
                            <p class="font-bold mb-1 border-b pb-1">Carrinho:</p>
                            <div id="lista-carrinho" class="space-y-1 mb-2 italic text-gray-600">Seu carrinho está vazio.</div>
                        </div>

                        <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full border p-2 rounded">
                            <option value="Sim">Preciso de Entrega (Sim)</option>
                            <option value="Não">Vou buscar no local (Não)</option>
                        </select>
                        <div id="campos-endereco" class="space-y-2">
                            <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full border p-2 rounded">
                            <input id="rua" type="text" placeholder="Rua / Endereço" class="w-full border p-2 rounded bg-gray-50">
                            <input id="num" type="text" placeholder="Número" class="w-full border p-2 rounded">
                        </div>
                        <div class="bg-yellow-50 p-3 rounded border border-yellow-200 text-sm">
                            <b>Total a Pagar:</b> <span id="resumo-carrinho">R$ 0.00</span>
                        </div>
                        <button onclick="enviarPedidoCompleto()" class="w-full bg-green-600 text-white p-3 rounded font-bold uppercase hover:bg-green-700 transition">Confirmar e Enviar</button>
                        <button onclick="limparCarrinho()" class="w-full text-xs text-red-500 underline mt-2">Limpar Carrinho</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Gerenciar Cardápio</h3>
                    <div class="bg-gray-50 p-4 rounded mb-6 border">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <input id="prod-nome" type="text" placeholder="Nome do Produto" class="border p-2 rounded">
                            <input id="prod-preco" type="number" placeholder="Preço" class="border p-2 rounded">
                        </div>
                        <button onclick="salvarProduto()" class="mt-2 w-full bg-green-600 text-white p-2 rounded font-bold">Salvar Produto</button>
                    </div>
                    <div id="admin-cardapio-lista" class="space-y-2 mb-8 text-sm"></div>

                    <h3 class="text-xl font-bold mb-4 border-t pt-4">Painel de Pedidos</h3>
                    <div id="lista-pedidos" class="space-y-3 text-sm"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[500px]">
                <h3 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">Suporte / Chat</h3>
                <div id="chat-box" class="flex-1 p-2 mb-4 bg-gray-50 rounded"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Digite..." class="flex-1 border p-2 rounded focus:outline-none">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let carrinho = [];
        let totalAcumulado = 0;

        // AUTH
        window.cadastrar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, e, s).then(() => alert("Conta criada!")).catch(err => alert("Erro: " + err.message));
        };
        window.logar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Login inválido!"));
        };
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = `Logado como: ${user.email}`;
                const isAdmin = user.email.includes('admin');
                if(isAdmin) {
                    document.getElementById('admin-view').classList.remove('hidden');
                    document.getElementById('cliente-view').classList.add('hidden');
                    carregarPedidosAdmin();
                    ouvirCardapio(true);
                } else {
                    document.getElementById('cliente-view').classList.remove('hidden');
                    document.getElementById('admin-view').classList.add('hidden');
                    ouvirCardapio(false);
                    ouvirStatusCliente(user.email); 
                }
                ouvirChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        // CEP
        window.toggleEndereco = () => {
            const div = document.getElementById('campos-endereco');
            div.classList.toggle('hidden', document.getElementById('opcao-entrega').value === "Não");
        };

        window.buscarCEP = async () => {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if(cep.length !== 8) return;
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if(!data.erro) document.getElementById('rua').value = `${data.logradouro}, ${data.bairro}`;
        };

        // CARDÁPIO E PRODUTOS
        window.salvarProduto = async () => {
            const nome = document.getElementById('prod-nome').value;
            const preco = parseFloat(document.getElementById('prod-preco').value);
            if(!nome || !preco) return alert("Preencha tudo");
            await addDoc(collection(db, "produtos"), { nome, preco, ativo: true });
            document.getElementById('prod-nome').value = "";
            document.getElementById('prod-preco').value = "";
        };

        window.toggleProduto = async (id, statusAtual) => {
            await updateDoc(doc(db, "produtos", id), { ativo: !statusAtual });
        };

        window.excluirProduto = async (id) => {
            if(confirm("Excluir item?")) await deleteDoc(doc(db, "produtos", id));
        };

        function ouvirCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                const listaC = document.getElementById('cardapio-lista');
                const listaA = document.getElementById('admin-cardapio-lista');
                if(listaC) listaC.innerHTML = ""; if(listaA) listaA.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const p = docSnap.data(); const id = docSnap.id;
                    if(isAdmin && listaA) {
                        listaA.innerHTML += `<div class="flex justify-between items-center p-2 border rounded ${p.ativo ? 'bg-white' : 'bg-gray-200 opacity-60'}">
                            <span>${p.nome} - <b>R$ ${p.preco.toFixed(2)}</b></span>
                            <div class="flex gap-2">
                                <button onclick="toggleProduto('${id}', ${p.ativo})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">${p.ativo ? 'Ocultar' : 'Mostrar'}</button>
                                <button onclick="excluirProduto('${id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">Excluir</button>
                            </div>
                        </div>`;
                    }
                    if(p.ativo && listaC) {
                        listaC.innerHTML += `<div class="flex flex-col md:flex-row justify-between items-center p-4 border rounded bg-white gap-3 shadow-sm">
                                <span class="font-bold text-gray-700">${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                                <div class="flex gap-2 items-center">
                                    <input type="number" id="qtd-${id}" value="1" min="1" class="border w-14 p-1 rounded text-center">
                                    <button onclick="selecionarItem('${p.nome}', ${p.preco}, '${id}')" class="bg-red-600 text-white px-4 py-1 rounded font-bold text-sm">ADICIONAR</button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        window.selecionarItem = (nome, preco, id) => {
            const qtdInput = document.getElementById(`qtd-${id}`);
            const qtdAdicionada = parseInt(qtdInput.value);
            const itemExistente = carrinho.find(item => item.nome === nome);
            if (itemExistente) {
                itemExistente.qtd += qtdAdicionada;
                itemExistente.subtotal = itemExistente.qtd * preco;
            } else {
                carrinho.push({ nome, qtd: qtdAdicionada, preco: preco, subtotal: preco * qtdAdicionada });
            }
            qtdInput.value = "1";
            atualizarCarrinhoVisual();
        };

        window.limparCarrinho = () => { carrinho = []; atualizarCarrinhoVisual(); };

        function atualizarCarrinhoVisual() {
            const listaDiv = document.getElementById('lista-carrinho');
            const resumoDiv = document.getElementById('resumo-carrinho');
            if (carrinho.length === 0) {
                listaDiv.innerHTML = "Seu carrinho está vazio.";
                resumoDiv.innerText = "R$ 0.00";
                totalAcumulado = 0;
                return;
            }
            listaDiv.innerHTML = ""; totalAcumulado = 0;
            carrinho.forEach(item => {
                totalAcumulado += item.subtotal;
                listaDiv.innerHTML += `<div>• <b>${item.qtd}x</b> ${item.nome} (R$ ${item.subtotal.toFixed(2)})</div>`;
            });
            resumoDiv.innerText = `R$ ${totalAcumulado.toFixed(2)}`;
        }

        // PEDIDOS E SINCRONIZAÇÃO DE STATUS
        window.enviarPedidoCompleto = async () => {
            if(carrinho.length === 0) return alert("Adicione algo!");
            const entrega = document.getElementById('opcao-entrega').value;
            let local = entrega === "Sim" ? `${document.getElementById('rua').value}, Nº ${document.getElementById('num').value}` : "Retirada no Local";
            if(entrega === "Sim" && (!document.getElementById('rua').value)) return alert("Endereço vazio!");

            await addDoc(collection(db, "pedidos"), {
                cliente: auth.currentUser.email,
                item: carrinho.map(i => `${i.qtd}x ${i.nome}`).join(", "),
                total: totalAcumulado.toFixed(2),
                entrega: local,
                status: "Pendente",
                data: serverTimestamp()
            });
            alert("Pedido enviado!");
            limparCarrinho();
        };

        window.mudarStatus = async (id, novoStatus) => {
            await updateDoc(doc(db, "pedidos", id), { status: novoStatus });
        };

        function carregarPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data(); const id = d.id;
                    lista.innerHTML += `
                        <div class="p-3 bg-white border-l-4 border-red-500 rounded shadow-md flex flex-col gap-2 mb-2">
                            <div class="flex justify-between">
                                <span><b>${p.cliente.split('@')[0]}:</b> ${p.item}</span>
                                <span class="bg-gray-100 px-2 rounded text-xs flex items-center font-bold">${p.status}</span>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-1">
                                <button onclick="mudarStatus('${id}', 'Confirmado')" class="bg-blue-500 text-white p-1 rounded text-[10px] font-bold">CONFIRMAR</button>
                                <button onclick="mudarStatus('${id}', 'Preparando')" class="bg-orange-500 text-white p-1 rounded text-[10px] font-bold">PREPARAR</button>
                                <button onclick="mudarStatus('${id}', 'A Caminho')" class="bg-purple-500 text-white p-1 rounded text-[10px] font-bold">A CAMINHO</button>
                                <button onclick="mudarStatus('${id}', 'Entregue')" class="bg-green-600 text-white p-1 rounded text-[10px] font-bold">CONCLUIR</button>
                            </div>
                        </div>`;
                });
            });
        }

        function ouvirStatusCliente(emailCliente) {
            // Removido o orderBy temporariamente para evitar erro de índice no Firebase, garantindo a sincronização imediata
            const q = query(collection(db, "pedidos"), where("cliente", "==", emailCliente));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('meus-pedidos-status');
                if(!box) return;
                box.innerHTML = "";
                if(snap.empty) { box.innerHTML = "Nenhum pedido em andamento."; return; }
                
                // Transformar em array para ordenar manualmente sem precisar de índice no Firebase
                const docs = [];
                snap.forEach(d => docs.push({id: d.id, ...d.data()}));
                docs.sort((a, b) => (b.data?.seconds || 0) - (a.data?.seconds || 0));

                docs.forEach(p => {
                    let classe = 'status-pendente';
                    if(p.status === 'Preparando') classe = 'status-preparando';
                    if(p.status === 'A Caminho' || p.status === 'Confirmado') classe = 'status-caminho';
                    if(p.status === 'Entregue') classe = 'status-entregue';
                    box.innerHTML += `
                        <div class="border-b pb-2 mb-2 flex justify-between items-center last:border-0">
                            <div class="flex flex-col">
                                <span class="font-medium">${p.item}</span>
                                <span class="text-[10px] text-gray-500">Total: R$ ${p.total}</span>
                            </div>
                            <span class="${classe} text-sm">● ${p.status}</span>
                        </div>`;
                });
            });
        }

        // CHAT
        window.enviarMensagem = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: input.value, hora: serverTimestamp() });
            input.value = "";
        };

        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data(); const classe = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    box.innerHTML += `<div class="msg ${classe}"><p class="text-[10px] font-bold opacity-50">${m.usuario.split('@')[0]}</p><p>${m.texto}</p></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
