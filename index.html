<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<style>
body{
  background:#ddd3c7;
  font-family:Arial;
  padding:20px;
}
.container{
  max-width:400px;
  margin:auto;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#ff6a00;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
</style>
</head>
<body>

<div class="container">
<h2>Sistema de Pedidos</h2>

<input type="email" id="email" placeholder="Digite seu email">
<input type="password" id="senha" placeholder="Digite sua senha">

<button onclick="registrar()">Registrar</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 SUA CONFIG (já está correta)
const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5",
  measurementId: "G-4HLF6VSY2Z"
};

// Inicializa Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ✅ REGISTRAR
window.registrar = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
  .then((userCredential)=>{
      document.getElementById("msg").innerText = "Cadastro realizado com sucesso!";
  })
  .catch((error)=>{
      document.getElementById("msg").innerText = error.message;
  });
}

// ✅ LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
  .then((userCredential)=>{
      document.getElementById("msg").innerText = "Login realizado com sucesso!";
  })
  .catch((error)=>{
      document.getElementById("msg").innerText = error.message;
  });
}
</script>

</body>
</html>
