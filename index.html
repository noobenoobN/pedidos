<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#fff7ed; }
.btn { background:#f97316; color:white; padding:8px 12px; border-radius:6px; }
.card { background:white; padding:15px; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1); margin-bottom:10px; }
</style>
</head>
<body class="p-6">

<h1 class="text-3xl font-bold text-orange-600 mb-6">Sistema de Pedidos</h1>

<!-- LOGIN -->
<div id="loginArea">
  <input id="email" type="email" placeholder="Email" class="border p-2 mb-2 w-full">
  <input id="senha" type="password" placeholder="Senha" class="border p-2 mb-2 w-full">
  <button onclick="registrar()" class="btn w-full mb-2">Registrar</button>
  <button onclick="login()" class="btn w-full">Entrar</button>
</div>

<!-- PAINEL -->
<div id="sistema" style="display:none;">

  <button onclick="logout()" class="btn mb-4">Sair</button>

  <!-- ADMIN -->
