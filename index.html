<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded">Criar Conta</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-6">
                <div id="cliente-view" class="hidden space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                        <div id="cardapio-lista" class="grid grid-cols-1 gap-3"></div>
                    </div>

                    <div id="checkout-area" class="bg-white p-6 rounded-lg shadow border-t-4 border-red-500">
                        <h3 class="text-xl font-bold mb-4">Finalizar Pedido</h3>
                        <div class="space-y-3">
                            <select id="entrega-tipo" onchange="toggleEndereco()" class="w-full border p-2 rounded">
                                <option value="entrega">Entregar em Casa</option>
                                <option value="retirada">Vou Buscar no Local</option>
                            </select>
                            
                            <div id="endereco-campos" class="space-y-2">
                                <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full border p-2 rounded">
                                <input id="rua" type="text" placeholder="Rua / Logradouro" class="w-full border p-2 rounded bg-gray-50">
                                <input id="num" type="text" placeholder="Número" class="w-full border p-2 rounded">
                            </div>

                            <div class="p-4 bg-gray-100 rounded">
                                <p class="font-bold">Total do Pedido: <span id="total-carrinho" class="text-red-600 text-xl">R$ 0,00</span></p>
                            </div>
                            <button id="btn-finalizar" onclick="finalizarPedido()" class="w-full bg-green-600 text-white p-4 rounded-lg font-bold text-lg">ENVIAR PEDIDO</button>
                        </div>
                    </div>
                </div>

                <div id="admin-view" class="hidden space-y-6">
                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-xl font-bold mb-4">Gerenciar Produtos</h3>
                        <div class="flex gap-2 mb-4">
                            <input id="prod-nome" type="text" placeholder="Nome" class="border p-2 rounded w-full">
                            <input id="prod-preco" type="number" placeholder="Preço" class="border p-2 rounded w-32">
                            <button onclick="salvarProduto()" class="bg-green-600 text-white px-4 rounded font-bold">Salvar</button>
                        </div>
                        <div id="admin-cardapio-lista" class="space-y-2"></div>
                    </div>

                    <div class="bg-white p-6 rounded-lg shadow">
                        <h3 class="text-xl font-bold mb-4">Pedidos Recebidos</h3>
                        <div id="lista-pedidos" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[600px]">
                <h3 class="text-xl font-bold mb-4 text-blue-600 border-b pb-2">Suporte</h3>
                <div id="chat-box" class="flex-1 p-2 mb-4 bg-gray-50 rounded"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Dúvida?" class="flex-1 border p-2 rounded focus:outline-none">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded">></button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let carrinho = [];

        // --- AUTH ---
        window.logar = () => signInWithEmailAndPassword(auth, email.value, senha.value).catch(e => alert("Erro no login"));
        window.cadastrar = () => createUserWithEmailAndPassword(auth, email.value, senha.value).catch(e => alert("Erro no cadastro"));
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                auth_screen.classList.add('hidden');
                main_screen.classList.remove('hidden');
                user_welcome.innerText = `Logado: ${user.email}`;
                const isAdmin = user.email.includes('admin');
                admin_view.classList.toggle('hidden', !isAdmin);
                cliente_view.classList.toggle('hidden', isAdmin);
                ouvirCardapio(isAdmin);
                if(isAdmin) carregarPedidosAdmin();
                ouvirChat();
            } else {
                auth_screen.classList.remove('hidden');
                main_screen.classList.add('hidden');
            }
        });

        // --- CEP E ENDEREÇO ---
        window.buscarCEP = async () => {
            const val = cep.value.replace(/\D/g, '');
            if(val.length !== 8) return;
            const res = await fetch(`https://viacep.com.br/ws/${val}/json/`);
            const data = await res.json();
            if(!data.erro) { rua.value = data.logradouro + ", " + data.bairro; }
        };

        window.toggleEndereco = () => {
            document.getElementById('endereco-campos').classList.toggle('hidden', entrega_tipo.value === 'retirada');
        };

        // --- GESTÃO DE PRODUTOS ---
        window.salvarProduto = async () => {
            const n = document.getElementById('prod-nome').value;
            const p = document.getElementById('prod-preco').value;
            if(!n || !p) return;
            await setDoc(doc(db, "produtos", n), { nome: n, preco: parseFloat(p), ativo: true });
        };

        window.toggleProduto = async (id, status) => updateDoc(doc(db, "produtos", id), { ativo: !status });
        window.excluirProduto = async (id) => deleteDoc(doc(db, "produtos", id));

        function ouvirCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const listaC = document.getElementById('cardapio-lista');
                const listaA = document.getElementById('admin-cardapio-lista');
                listaC.innerHTML = ""; listaA.innerHTML = "";

                snap.forEach(d => {
                    const p = d.data();
                    if(isAdmin) {
                        listaA.innerHTML += `<div class="p-2 border rounded flex justify-between items-center ${p.ativo ? 'bg-white' : 'bg-gray-200'}">
                            <span>${p.nome} - R$ ${p.preco}</span>
                            <div class="flex gap-2">
                                <button onclick="toggleProduto('${d.id}', ${p.ativo})" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">Visível</button>
                                <button onclick="excluirProduto('${d.id}')" class="bg-red-500 text-white px-2 py-1 rounded text-xs">X</button>
                            </div>
                        </div>`;
                    }
                    if(p.ativo) {
                        listaC.innerHTML += `<div class="p-4 border rounded bg-white flex justify-between items-center">
                            <div><p class="font-bold">${p.nome}</p><p class="text-green-600">R$ ${p.preco}</p></div>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qtd-${d.id}" value="1" min="1" class="border w-12 p-1 rounded text-center">
                                <button onclick="addCarrinho('${p.nome}', ${p.preco}, '${d.id}')" class="bg-red-600 text-white px-4 py-2 rounded">Adicionar</button>
                            </div>
                        </div>`;
                    }
                });
            });
        }

        // --- CARRINHO ---
        window.addCarrinho = (nome, preco, id) => {
            const qtd = parseInt(document.getElementById(`qtd-${id}`).value);
            carrinho.push({ nome, preco, qtd });
            atualizarTotal();
            alert(`${qtd}x ${nome} adicionado!`);
        };

        function atualizarTotal() {
            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
            total_carrinho.innerText = `R$ ${total.toFixed(2)}`;
        }

        window.finalizarPedido = async () => {
            if(carrinho.length === 0) return alert("Seu carrinho está vazio!");
            
            const dadosPedido = {
                cliente: auth.currentUser.email,
                itens: carrinho,
                tipo: entrega_tipo.value,
                endereco: entrega_tipo.value === 'entrega' ? `${rua.value}, Nº ${num.value} (CEP: ${cep.value})` : 'Busca no Local',
                total: carrinho.reduce((sum, i) => sum + (i.preco * i.qtd), 0),
                data: serverTimestamp()
            };

            await addDoc(collection(db, "pedidos"), dadosPedido);
            alert("Pedido enviado com sucesso!");
            carrinho = []; atualizarTotal();
        };

        // --- PEDIDOS E CHAT ---
        function carregarPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                lista_pedidos.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const itensTxt = p.itens.map(i => `${i.qtd}x ${i.nome}`).join(', ');
                    lista_pedidos.innerHTML += `<div class="p-3 bg-white border-l-4 border-red-500 rounded shadow-sm text-sm">
                        <p><b>Cliente:</b> ${p.cliente.split('@')[0]} | <b>Total:</b> R$ ${p.total}</p>
                        <p><b>Pedido:</b> ${itensTxt}</p>
                        <p class="text-red-600"><b>Entrega:</b> ${p.endereco}</p>
                    </div>`;
                });
            });
        }

        window.enviarMensagem = async () => {
            if(!chat_input.value.trim()) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: chat_input.value, hora: serverTimestamp() });
            chat_input.value = "";
        };

        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                chat_box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const classe = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    chat_box.innerHTML += `<div class="msg ${classe}"><b>${m.usuario.split('@')[0]}:</b> ${m.texto}</div>`;
                });
                chat_box.scrollTop = chat_box.scrollHeight;
            });
        }
    </script>
</body>
</html>
