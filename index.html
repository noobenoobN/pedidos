from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, onSnapshot, updateDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",

  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let roleGlobal = null;

/* ================= CADASTRO ================= */

window.registrar = async function(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const cred = await createUserWithEmailAndPassword(auth,email,senha);

    const usersSnap = await getDocs(collection(db,"users"));
    const role = usersSnap.empty ? "admin" : "cliente";

    await setDoc(doc(db,"users",cred.user.uid),{
      email,
      role
    });

    alert("Conta criada como: " + role);

  }catch(e){
    alert(e.message);
  }
}

/* ================= LOGIN ================= */

window.login = async function(){
  try{
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    await signInWithEmailAndPassword(auth,email,senha);
  }catch(e){
    alert(e.message);
  }
}

/* ================= AUTH ================= */

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    document.getElementById("loginArea").classList.remove("hidden");
    document.getElementById("painel").classList.add("hidden");
    return;
  }

  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("painel").classList.remove("hidden");

  const snap = await getDoc(doc(db,"users",user.uid));
  roleGlobal = snap.data().role;

  if(roleGlobal==="admin"){
    renderAdmin();
  }else{
    renderCliente();
  }
});
