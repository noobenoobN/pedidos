<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Pro - Painel Gestor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 200px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 5px; padding: 5px 10px; border-radius: 5px; font-size: 13px; }
        .msg-admin { background: #fee2e2; align-self: flex-start; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded shadow">
        <h2 class="text-2xl font-bold mb-4 text-center">Acesso Delivery</h2>
        <input id="email" type="email" placeholder="E-mail" class="w-full border p-2 mb-2 rounded">
        <input id="senha" type="password" placeholder="Senha" class="w-full border p-2 mb-4 rounded">
        <button onclick="logar()" class="w-full bg-red-600 text-white p-2 rounded">Entrar</button>
        <button onclick="cadastrar()" class="w-full text-gray-500 mt-2 text-sm w-full">Criar conta</button>
    </div>

    <div id="main-screen" class="hidden">
        <nav class="bg-red-600 text-white p-4 flex justify-between shadow-lg">
            <span id="user-info" class="font-bold"></span>
            <button onclick="auth.signOut()" class="text-sm underline">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div class="md:col-span-2 bg-white p-4 rounded shadow">
                
                <div id="admin-view" class="hidden">
                    <h3 class="font-bold text-lg mb-4 border-b pb-2">Gerenciar Cardápio</h3>
                    <div class="grid grid-cols-1 gap-2 mb-6 bg-gray-100 p-3 rounded">
                        <input id="p-nome" type="text" placeholder="Nome do Produto" class="p-2 border rounded">
                        <input id="p-preco" type="number" placeholder="Preço (Ex: 25.90)" class="p-2 border rounded">
                        <button onclick="salvarProduto()" class="bg-green-600 text-white p-2 rounded font-bold">+ Adicionar/Atualizar</button>
                    </div>
                    <div id="lista-admin-produtos" class="space-y-2"></div>
                    
                    <h3 class="font-bold text-lg mt-8 mb-4 border-b pb-2">Pedidos Recebidos</h3>
                    <div id="lista-pedidos" class="space-y-2"></div>
                </div>

                <div id="cliente-view" class="hidden">
                    <h3 class="font-bold text-lg mb-4">Fazer Pedido</h3>
                    <div id="cardapio-cliente" class="grid grid-cols-1 gap-3">
                        </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded shadow flex flex-col h-[500px]">
                <h3 class="font-bold border-b mb-2">Chat Suporte</h3>
                <div id="chat-box" class="flex-1 bg-gray-50 p-2 rounded mb-2"></div>
                <div class="flex gap-1">
                    <input id="chat-input" type="text" class="flex-1 border p-2 rounded text-sm">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-3 rounded">></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, setDoc, doc, deleteDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH ---
        window.logar = () => signInWithEmailAndPassword(auth, email.value, senha.value);
        window.cadastrar = () => createUserWithEmailAndPassword(auth, email.value, senha.value);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                auth_screen.classList.add('hidden');
                main_screen.classList.remove('hidden');
                user_info.innerText = user.email;
                
                const isAdmin = user.email.includes('admin');
                admin_view.classList.toggle('hidden', !isAdmin);
                cliente_view.classList.toggle('hidden', isAdmin);
                
                carregarCardapio(isAdmin);
                if(isAdmin) carregarPedidos();
                ouvirChat();
            } else {
                auth_screen.classList.remove('hidden');
                main_screen.classList.add('hidden');
            }
        });

        // --- GESTÃO DE PRODUTOS (ADMIN) ---
        window.salvarProduto = async () => {
            const nome = document.getElementById('p-nome').value;
            const preco = document.getElementById('p-preco').value;
            if(!nome || !preco) return alert("Preencha tudo!");

            await setDoc(doc(db, "produtos", nome), {
                nome: nome,
                preco: parseFloat(preco),
                visivel: true
            });
            document.getElementById('p-nome').value = "";
            document.getElementById('p-preco').value = "";
        };

        window.alternarVisibilidade = async (id, status) => {
            await updateDoc(doc(db, "produtos", id), { visivel: !status });
        };

        window.excluirProduto = async (id) => {
            if(confirm("Excluir produto?")) await deleteDoc(doc(db, "produtos", id));
        };

        // --- CARREGAR CARDÁPIO ---
        function carregarCardapio(isAdmin) {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const listaAdmin = document.getElementById('lista-admin-produtos');
                const listaCliente = document.getElementById('cardapio-cliente');
                listaAdmin.innerHTML = "";
                listaCliente.innerHTML = "";

                snap.forEach(d => {
                    const p = d.data();
                    // Render para Admin
                    listaAdmin.innerHTML += `
                        <div class="flex justify-between items-center p-2 border rounded ${p.visivel ? '' : 'opacity-40 bg-gray-200'}">
                            <span><b>${p.nome}</b> - R$ ${p.preco}</span>
                            <div class="flex gap-2">
                                <button onclick="alternarVisibilidade('${d.id}', ${p.visivel})" class="text-xs bg-yellow-500 text-white p-1 rounded">${p.visivel ? 'Ocultar' : 'Mostrar'}</button>
                                <button onclick="excluirProduto('${d.id}')" class="text-xs bg-red-500 text-white p-1 rounded">X</button>
                            </div>
                        </div>`;
                    
                    // Render para Cliente (só se visível)
                    if(p.visivel) {
                        listaCliente.innerHTML += `
                            <div class="flex justify-between items-center p-4 border rounded shadow-sm bg-white">
                                <span><b>${p.nome}</b><br><small class="text-green-600 font-bold">R$ ${p.preco}</small></span>
                                <button onclick="fazerPedido('${p.nome}', ${p.preco})" class="bg-red-600 text-white px-4 py-2 rounded">Pedir</button>
                            </div>`;
                    }
                });
            });
        }

        // --- PEDIDOS E CHAT (Resumido) ---
        window.fazerPedido = async (item, valor) => {
            await addDoc(collection(db, "pedidos"), { cliente: auth.currentUser.email, item, valor, data: serverTimestamp() });
            alert("Pedido Enviado!");
        };

        function carregarPedidos() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                lista_pedidos.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    lista_pedidos.innerHTML += `<div class="p-2 border-l-4 border-red-500 bg-gray-50 text-xs"><b>${p.cliente}:</b> ${p.item}</div>`;
                });
            });
        }

        window.enviarMensagem = async () => {
            const txt = chat_input.value;
            if(!txt) return;
            await addDoc(collection(db, "mensagens"), { usuario: auth.currentUser.email, texto: txt, hora: serverTimestamp() });
            chat_input.value = "";
        };

        function ouvirChat() {
            onSnapshot(query(collection(db, "mensagens"), orderBy("hora", "asc")), (snap) => {
                chat_box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const classe = m.usuario.includes('admin') ? 'msg-admin' : 'msg-cliente';
                    chat_box.innerHTML += `<div class="msg ${classe}"><b>${m.usuario.split('@')[0]}:</b> ${m.texto}</div>`;
                });
                chat_box.scrollTop = chat_box.scrollHeight;
            });
        }
    </script>
</body>
</html>
