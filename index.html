<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<style>
body{
  font-family: Arial;
  background:#ddd3c7;
  padding:20px;
}
.container{
  max-width:400px;
  margin:auto;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#ff6a00;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
#areaPedidos{
  display:none;
}
.pedido{
  background:white;
  padding:10px;
  margin:5px 0;
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="areaLogin">
<h2>Sistema de Pedidos</h2>

<input type="email" id="email" placeholder="Digite seu email">
<input type="password" id="senha" placeholder="Digite sua senha">

<button onclick="registrar()">Registrar</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<!-- ÁREA LOGADO -->
<div id="areaPedidos">
<h2>Bem-vindo!</h2>
<p id="usuarioEmail"></p>

<input type="text" id="produtoInput" placeholder="Digite o produto">
<button onclick="fazerPedido()">Fazer Pedido</button>

<h3>Meus Pedidos:</h3>
<div id="listaPedidos"></div>

<button onclick="sair()">Sair</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 COLE SUA CONFIG DO FIREBASE AQUI
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE_BUCKET",
  messagingSenderId: "SEU_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioAtual = null;

// REGISTRAR
window.registrar = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  createUserWithEmailAndPassword(auth, email, senha)
  .then(()=> msg.innerText = "Cadastro realizado!")
  .catch(error => msg.innerText = error.message);
}

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
  .catch(error => msg.innerText = error.message);
}

// SAIR
window.sair = function(){
  signOut(auth);
}

// FAZER PEDIDO
window.fazerPedido = async function(){
  const produto = document.getElementById("produtoInput").value;

  if(!produto) return;

  await addDoc(collection(db,"pedidos"),{
    produto: produto,
    usuario: usuarioAtual.email,
    data: new Date()
  });

  produtoInput.value="";
}

// TROCA DE TELA AUTOMÁTICA
onAuthStateChanged(auth,(user)=>{
  if(user){
    usuarioAtual = user;

    areaLogin.style.display="none";
    areaPedidos.style.display="block";
    usuarioEmail.innerText="Logado como: "+user.email;

    carregarPedidos();
  }else{
    areaLogin.style.display="block";
    areaPedidos.style.display="none";
  }
});

// CARREGAR PEDIDOS DO USUÁRIO
function carregarPedidos(){
  const q = query(
    collection(db,"pedidos"),
    where("usuario","==",usuarioAtual.email)
  );

  onSnapshot(q,(snapshot)=>{
    listaPedidos.innerHTML="";

    snapshot.forEach(doc=>{
      const pedido = doc.data();

      listaPedidos.innerHTML += `
        <div class="pedido">
          ${pedido.produto}
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
