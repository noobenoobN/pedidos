<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Delivery - Versão Final com Status Motoboy</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.hidden { display:none; }

#chat-box{
height:250px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

.msg{
margin-bottom:8px;
padding:6px 12px;
border-radius:8px;
max-width:80%;
}

.msg-admin{
background:#fee2e2;
align-self:flex-start;
border:1px solid #fecaca;
}

.msg-cliente{
background:#dbeafe;
align-self:flex-end;
border:1px solid #bfdbfe;
}

.status-pendente{color:#dc2626;font-weight:bold;}
.status-preparando{color:#d97706;font-weight:bold;}
.status-caminho{color:#2563eb;font-weight:bold;}
.status-entregue{color:#16a34a;font-weight:bold;}

</style>
</head>

<body class="bg-gray-100 font-sans">

<div id="auth-screen" class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-4 text-center">
Login
</h2>

<input id="email" type="email" placeholder="Seu email"
class="w-full border p-3 rounded mb-3">

<input id="senha" type="password" placeholder="Sua senha"
class="w-full border p-3 rounded">

<button onclick="logar()"
class="w-full bg-red-600 text-white font-bold p-3 rounded mt-4">
Entrar
</button>

<button onclick="cadastrar()"
class="w-full bg-gray-200 text-gray-700 p-3 rounded mt-2">
Criar Nova Conta
</button>

</div>

    <div id="main-screen" class="hidden">

<div class="bg-red-600 text-white p-4 flex justify-between">

<h1 class="font-bold">
Meu Delivery
</h1>

<button onclick="sair()">
Sair
</button>

</div>

<div class="p-4">

<h2 class="text-xl font-bold mb-3">
Novo Pedido
</h2>

<input id="cliente" placeholder="Nome do cliente"
class="w-full border p-2 rounded mb-2">

<input id="telefone" placeholder="Telefone"
class="w-full border p-2 rounded mb-2">

<input id="rua" placeholder="Rua"
class="w-full border p-2 rounded mb-2">

<div class="grid grid-cols-2 gap-2">

<input id="bairro" placeholder="Bairro"
class="w-full border p-2 rounded">

<input id="num" type="text" placeholder="Número"
class="w-full border p-2 rounded">

</div>

<button onclick="enviarPedidoCompleto()"
class="w-full bg-green-600 text-white p-3 rounded font-bold mt-4">
Confirmar e Enviar
</button>

</div>

</div>

    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey:"SUA_API_KEY",
authDomain:"SEU_DOMINIO",
projectId:"SEU_PROJETO"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);


window.cadastrar = ()=>{

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

createUserWithEmailAndPassword(auth,email,senha)
.then(()=>alert("Conta criada"))
.catch(e=>alert(e.message));

};


window.logar = ()=>{

const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

signInWithEmailAndPassword(auth,email,senha)
.catch(()=>alert("Erro login"));

};


window.sair = ()=> signOut(auth);

        function ouvirChat(){

onSnapshot(collection(db,"mensagens"),(snap)=>{

const box=document.getElementById("chat-box");

box.innerHTML="";

snap.forEach(d=>{

const m=d.data();

box.innerHTML+=`
<div class="msg msg-cliente">
${m.usuario}: ${m.texto}
</div>
`;

});

});

}


// =============================
// IMPRESSÃO DE PEDIDO
// =============================

window.imprimirPedido=function(pedido){

let conteudo=`

PEDIDO DELIVERY

Cliente: ${pedido.cliente}
Telefone: ${pedido.telefone}
Endereço: ${pedido.rua}

Itens:
${pedido.itens}

Total: R$ ${pedido.total}

Status: ${pedido.status}

${new Date().toLocaleString()}
`;

let janela=window.open("","","width=400,height=600");

janela.document.write("<pre>"+conteudo+"</pre>");

janela.document.close();

janela.print();

salvarPedidoLocal(pedido);

};


// =============================
// SALVAR PEDIDO LOCAL
// =============================

function salvarPedidoLocal(pedido){

let pedidos=JSON.parse(localStorage.getItem("pedidosSalvos"))||[];

pedidos.push(pedido);

localStorage.setItem("pedidosSalvos",JSON.stringify(pedidos));

}


// =============================
// BAIXAR PEDIDO
// =============================

window.baixarPedido=function(pedido){

let texto=`

PEDIDO DELIVERY

Cliente: ${pedido.cliente}
Telefone: ${pedido.telefone}
Endereço: ${pedido.rua}

Itens:
${pedido.itens}

Total: R$ ${pedido.total}

Status: ${pedido.status}

${new Date().toLocaleString()}
`;

let blob=new Blob([texto],{type:"text/plain"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="pedido.txt";

link.click();

};

</script>

</body>
</html>
