<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Pedidos</title>

<style>
body{
  font-family:Arial;
  background:#f5f1e9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}
.card{
  background:white;
  padding:20px;
  border-radius:8px;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  width:350px;
  max-height:90vh;
  overflow:auto;
}
input,button{
  width:100%;
  margin:6px 0;
  padding:10px;
}
button{
  background:#2086f0;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{background:#0f5cc1;}
h2{text-align:center;}
.item{
  border-bottom:1px solid #ccc;
  padding:6px 0;
}
.total{
  font-weight:bold;
  margin-top:10px;
  font-size:18px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="card">
<h2>Login / Cadastro</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<input type="text" id="telefone" placeholder="Telefone">
<button onclick="registrar()">Registrar</button>
<button onclick="entrar()">Entrar</button>
<p id="status"></p>
</div>

<!-- ADMIN -->
<div id="admin" class="card" style="display:none;">
<h2>Painel Admin</h2>

<h3>Novo Produto</h3>
<input type="text" id="nomeProduto" placeholder="Nome">
<input type="number" id="valorProduto" placeholder="Valor">
<button onclick="addProduto()">Adicionar</button>

<h3>Produtos</h3>
<div id="listaProdutos"></div>

<h3>Pedidos</h3>
<div id="listaPedidos"></div>
</div>

<!-- CLIENTE -->
<div id="cliente" class="card" style="display:none;">
<h2>Painel Cliente</h2>

<h3>Produtos</h3>
<div id="produtos"></div>

<div class="total">Total: R$ <span id="total">0.00</span></div>

<button onclick="fazerPedido()">Fazer Pedido</button>

<h3>Meus Pedidos</h3>
<div id="meusPedidos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, onSnapshot, updateDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioAtual=null;
let roleAtual=null;
let carrinho=[];

const emailInput=document.getElementById("email");
const senhaInput=document.getElementById("senha");
const telefoneInput=document.getElementById("telefone");
const status=document.getElementById("status");

window.registrar=async()=>{
try{
const cred=await createUserWithEmailAndPassword(auth,emailInput.value,senhaInput.value);
const uid=cred.user.uid;
const usuarios=await getDocs(collection(db,"usuarios"));
const primeiro=usuarios.empty;

await setDoc(doc(db,"usuarios",uid),{
email:emailInput.value,
telefone:telefoneInput.value,
role:primeiro?"admin":"cliente",
criadoEm:serverTimestamp()
});

status.innerHTML="Registrado!";
}catch(e){status.innerHTML=e.message;}
};

window.entrar=async()=>{
try{
const cred=await signInWithEmailAndPassword(auth,emailInput.value,senhaInput.value);
usuarioAtual=cred.user;
await carregarRole(usuarioAtual.uid);
mostrarPainel();
}catch(e){status.innerHTML=e.message;}
};

async function carregarRole(uid){
const snap=await getDoc(doc(db,"usuarios",uid));
roleAtual=snap.data().role;
}

function mostrarPainel(){
document.getElementById("login").style.display="none";
if(roleAtual==="admin"){
document.getElementById("admin").style.display="block";
iniciarAdmin();
}else{
document.getElementById("cliente").style.display="block";
iniciarCliente();
}
}

function iniciarAdmin(){
onSnapshot(collection(db,"produtos"),snap=>{
listaProdutos.innerHTML="";
snap.forEach(d=>{
const p=d.data();
listaProdutos.innerHTML+=`
<div class="item">
${p.nome} - R$ ${p.valor}
</div>`;
});
});

onSnapshot(query(collection(db,"pedidos"),orderBy("criadoEm","desc")),snap=>{
listaPedidos.innerHTML="";
snap.forEach(d=>{
const p=d.data();
let itens="";
p.itens.forEach(i=>{
itens+=`${i.nome} x${i.qtd} <br>`;
});
listaPedidos.innerHTML+=`
<div class="item">
<b>ID:</b>${d.id}<br>
${itens}
Status: ${p.status}<br>
<button onclick="mudarStatus('${d.id}','a caminho')">A Caminho</button>
<button onclick="mudarStatus('${d.id}','concluído')">Concluir</button>
</div>`;
});
});
}

window.addProduto=async()=>{
await addDoc(collection(db,"produtos"),{
nome:nomeProduto.value,
valor:Number(valorProduto.value),
criadoEm:serverTimestamp()
});
nomeProduto.value="";
valorProduto.value="";
};

window.mudarStatus=async(id,status)=>{
await updateDoc(doc(db,"pedidos",id),{status});
};

function iniciarCliente(){
onSnapshot(collection(db,"produtos"),snap=>{
produtos.innerHTML="";
carrinho=[];
document.getElementById("total").innerText="0.00";

snap.forEach(d=>{
const p=d.data();
produtos.innerHTML+=`
<div class="item">
<label>
<input type="checkbox" onchange="selecionarProduto('${d.id}','${p.nome}',${p.valor},this)">
${p.nome} - R$ ${p.valor}
</label>
<input type="number" min="1" value="1" id="qtd_${d.id}">
</div>`;
});
});

onSnapshot(
query(collection(db,"pedidos"),where("cliente","==",usuarioAtual.uid),orderBy("criadoEm","desc")),
snap=>{
meusPedidos.innerHTML="";
snap.forEach(d=>{
const p=d.data();
meusPedidos.innerHTML+=`
<div class="item">
ID:${d.id}<br>Status:${p.status}
</div>`;
});
});
}

window.selecionarProduto=(id,nome,valor,checkbox)=>{
const qtdInput=document.getElementById("qtd_"+id);
const qtd=Number(qtdInput.value);

if(checkbox.checked){
carrinho.push({id,nome,valor,qtd});
}else{
carrinho=carrinho.filter(p=>p.id!==id);
}
calcularTotal();
};

function calcularTotal(){
let total=0;
carrinho.forEach(p=>{
total+=p.valor*p.qtd;
});
document.getElementById("total").innerText=total.toFixed(2);
}

window.fazerPedido=async()=>{
if(carrinho.length===0){
alert("Selecione produtos");
return;
}

await addDoc(collection(db,"pedidos"),{
cliente:usuarioAtual.uid,
itens:carrinho,
status:"aguardando",
criadoEm:serverTimestamp()
});

alert("Pedido enviado!");
carrinho=[];
document.getElementById("total").innerText="0.00";
};

onAuthStateChanged(auth,async user=>{
if(user){
usuarioAtual=user;
await carregarRole(user.uid);
mostrarPainel();
}
});
</script>
</body>
</html>
