<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Delivery - Versão Final com Status Motoboy</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.hidden { display: none; }
#chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
.msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
.msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
.msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }

.status-pendente { color: #dc2626; font-weight: bold; }
.status-preparando { color: #d97706; font-weight: bold; }
.status-caminho { color: #2563eb; font-weight: bold; }
.status-entregue { color: #16a34a; font-weight: bold; }
.status-cancelado { color: #4b5563; font-weight: bold; text-decoration: line-through; }
</style>

</head>

<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">

<h2 class="text-2xl font-bold mb-6 text-center text-red-600">
Delivery Login
</h2>

<div class="space-y-4">

<input id="email" type="email" placeholder="Seu e-mail"
class="w-full border p-3 rounded">

<input id="senha" type="password" placeholder="Sua senha"
class="w-full border p-3 rounded">

<button onclick="logar()"
class="w-full bg-red-600 text-white font-bold p-3 rounded">
Entrar
</button>

<button onclick="cadastrar()"
class="w-full bg-gray-200 text-gray-700 p-3 rounded">
Criar Nova Conta
</button>

</div>
</div>

    <div id="main-screen" class="hidden min-h-screen">

<nav class="bg-red-600 text-white p-4 flex justify-between">

<span id="user-welcome">
Carregando...
</span>

<button onclick="sair()" class="bg-red-800 px-3 py-1 rounded">
Sair
</button>

</nav>

<div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">

    <div id="cliente-view" class="hidden">

<h3 class="text-xl font-bold mb-4">
Cardápio
</h3>

<div id="cardapio-lista"
class="grid grid-cols-1 gap-3 mb-6">
</div>

        <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {

getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
serverTimestamp,
doc,
updateDoc,
deleteDoc,
where,
getDocs,
writeBatch,
getDoc,
setDoc

}

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
