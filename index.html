<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Delivery - Versão Corrigida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 250px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 6px 12px; border-radius: 8px; max-width: 80%; }
        .msg-admin { background: #fee2e2; align-self: flex-start; border: 1px solid #fecaca; }
        .msg-cliente { background: #dbeafe; align-self: flex-end; border: 1px solid #bfdbfe; }
        .status-pendente { color: #dc2626; font-weight: bold; }
        .status-preparando { color: #d97706; font-weight: bold; }
        .status-caminho { color: #2563eb; font-weight: bold; }
        .status-entregue { color: #16a34a; font-weight: bold; }
        .status-cancelado { color: #4b5563; font-weight: bold; text-decoration: line-through; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-center text-red-600">Delivery Login</h2>
        <div class="space-y-4">
            <input id="email" type="email" placeholder="Seu e-mail" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <input id="senha" type="password" placeholder="Sua senha" class="w-full border p-3 rounded focus:outline-none focus:ring-2 focus:ring-red-500">
            <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-3 rounded hover:bg-red-700 transition">Entrar</button>
            <button onclick="cadastrar()" class="w-full bg-gray-200 text-gray-700 p-3 rounded hover:bg-gray-300 transition">Criar Nova Conta</button>
        </div>
    </div>

    <div id="motoboy-setup" class="hidden max-w-md mx-auto mt-20 p-6 bg-white rounded-lg shadow-xl">
        <h2 class="text-xl font-bold mb-4">Completar Perfil Motoboy</h2>
        <div class="space-y-3">
            <input id="moto-tel" type="text" placeholder="Telefone" class="w-full border p-2 rounded">
            <input id="moto-cep" type="text" placeholder="Seu CEP" onblur="buscarCEPMotoboy()" class="w-full border p-2 rounded">
            <input id="moto-rua" type="text" placeholder="Endereço" class="w-full border p-2 rounded bg-gray-50" readonly>
            <input id="moto-num" type="text" placeholder="Número" class="w-full border p-2 rounded">
            <button onclick="salvarPerfilMotoboy()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Solicitar Aprovação</button>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen">
        <nav class="bg-red-600 text-white p-4 flex justify-between items-center shadow-md">
            <span id="user-welcome" class="font-medium">Carregando...</span>
            <button onclick="sair()" class="bg-red-800 px-3 py-1 rounded text-sm">Sair</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
                
                <div id="cliente-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 gap-3 mb-6"></div>
                    <div id="meus-pedidos-status" class="bg-white border rounded p-3 text-sm space-y-2 mb-4"></div>
                    
                    <div class="border-t pt-4 space-y-3">
                        <h3 class="font-bold text-lg">Carrinho</h3>
                        <div id="lista-carrinho" class="italic text-gray-600">Vazio</div>
                        <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full border p-2 rounded">
                            <option value="Sim">Entrega</option>
                            <option value="Não">Retirada</option>
                        </select>
                        <div id="campos-endereco" class="space-y-2">
                            <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="border p-2 w-full">
                            <input id="rua" type="text" placeholder="Rua" class="border p-2 w-full bg-gray-50">
                            <input id="num" type="text" placeholder="Nº" class="border p-2 w-full">
                        </div>
                        <div class="font-bold text-lg">Total: <span id="total-geral">R$ 0.00</span></div>
                        <button onclick="enviarPedidoCompleto()" class="w-full bg-green-600 text-white p-3 rounded font-bold">ENVIAR PEDIDO</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden">
                    <div class="flex gap-4 mb-4 border-b">
                        <button onclick="tabAdmin('pedidos')" class="pb-2 font-bold border-b-2 border-red-600">Pedidos</button>
                        <button onclick="tabAdmin('motoboys')" class="pb-2 font-bold">Motoboys</button>
                        <button onclick="tabAdmin('config')" class="pb-2 font-bold">Configurações</button>
                    </div>

                    <div id="tab-pedidos">
                        <h3 class="text-xl font-bold mb-4">Painel de Pedidos</h3>
                        <div id="lista-pedidos" class="space-y-3 text-sm"></div>
                    </div>

                    <div id="tab-motoboys" class="hidden">
                        <h3 class="text-xl font-bold mb-4">Gerenciar Motoboys</h3>
                        <div id="lista-motoboys" class="space-y-2"></div>
                    </div>

                    <div id="tab-config" class="hidden">
                        <h3 class="text-xl font-bold mb-4">Configurações</h3>
                        <div class="space-y-3">
                            <input id="cep-origem" type="text" placeholder="CEP Loja" class="border p-2 w-full">
                            <input id="valor-km" type="number" placeholder="Valor por KM" class="border p-2 w-full">
                            <button onclick="salvarConfig()" class="bg-red-600 text-white p-2 rounded w-full">Salvar</button>
                        </div>
                    </div>
                </div>

                <div id="motoboy-view" class="hidden">
                    <h3 class="text-xl font-bold mb-4">Minhas Entregas</h3>
                    <div id="lista-entregas-moto" class="space-y-3"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow flex flex-col h-[500px]">
                <h3 class="text-xl font-bold text-blue-600 mb-4">Chat</h3>
                <div id="chat-box" class="flex-1 bg-gray-50 p-2 mb-4 rounded"></div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" class="flex-1 border p-2">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, deleteDoc, where, getDocs, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let carrinho = [];
        let taxaEntrega = 0;
        let listaDeMotoboys = [];

        // --- AUTH EXPOSTO AO WINDOW ---
        window.cadastrar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, e, s).catch(err => alert(err.message));
        };
        window.logar = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro no Login"));
        };
        window.sair = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('user-welcome').innerText = user.email;
                
                const isAdmin = user.email.includes('admin');
                const isMotoboy = user.email.includes('motoboy');

                if(isAdmin) {
                    mostrarTela('admin-view');
                    ouvirPedidosAdmin();
                    ouvirMotoboys();
                } else if(isMotoboy) {
                    const docM = await getDoc(doc(db, "motoboys", user.uid));
                    if(!docM.exists()) mostrarTela('motoboy-setup');
                    else if(!docM.data().aprovado) alert("Aguardando aprovação");
                    else { mostrarTela('motoboy-view'); ouvirEntregasMotoboy(user.email); }
                } else {
                    mostrarTela('cliente-view');
                    ouvirCardapio();
                }
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-screen').classList.add('hidden');
            }
        });

        function mostrarTela(id) {
            document.getElementById('main-screen').classList.remove('hidden');
            ['cliente-view', 'admin-view', 'motoboy-view', 'motoboy-setup'].forEach(d => document.getElementById(d).classList.add('hidden'));
            if(id) document.getElementById(id).classList.remove('hidden');
        }

        // --- FUNÇÕES ADMIN CORRIGIDAS (EXPOSTAS AO WINDOW) ---
        window.tabAdmin = (tab) => {
            ['tab-pedidos', 'tab-motoboys', 'tab-config'].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        };

        window.atribuirMotoboy = async (idPedido, emailMoto) => {
            if(!emailMoto) return;
            await updateDoc(doc(db, "pedidos", idPedido), { 
                motoboy: emailMoto,
                status: "A Caminho" 
            });
            alert("Motoboy Delegado!");
        };

        window.aprovarMoto = async (id) => await updateDoc(doc(db, "motoboys", id), { aprovado: true });

        function ouvirMotoboys() {
            onSnapshot(collection(db, "motoboys"), (snap) => {
                const lista = document.getElementById('lista-motoboys');
                lista.innerHTML = "";
                listaDeMotoboys = [];
                snap.forEach(d => {
                    const m = d.data();
                    if(m.aprovado) listaDeMotoboys.push({id: d.id, ...m});
                    lista.innerHTML += `
                        <div class="p-2 border mb-2 flex justify-between">
                            <span>${m.email} (${m.aprovado ? 'Aprovado' : 'Pendente'})</span>
                            ${!m.aprovado ? `<button onclick="aprovarMoto('${d.id}')" class="bg-green-500 text-white px-2">Aprovar</button>` : ''}
                        </div>`;
                });
            });
        }

        function ouvirPedidosAdmin() {
            onSnapshot(query(collection(db, "pedidos"), orderBy("data", "desc")), (snap) => {
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const id = d.id;
                    
                    let select = `<select onchange="atribuirMotoboy('${id}', this.value)" class="border p-1 text-xs">
                        <option value="">Delegar...</option>`;
                    listaDeMotoboys.forEach(m => {
                        select += `<option value="${m.email}" ${p.motoboy === m.email ? 'selected' : ''}>${m.email}</option>`;
                    });
                    select += `</select>`;

                    lista.innerHTML += `
                        <div class="p-3 bg-white border mb-2">
                            <div class="flex justify-between"><b>${p.cliente}</b> <span>${p.status}</span></div>
                            <div class="text-xs">${p.item}</div>
                            <div class="mt-2 flex gap-2">
                                <button onclick="mudarStatus('${id}', 'Confirmado')" class="bg-blue-500 text-white px-2">Confimar</button>
                                ${select}
                                <button onclick="mudarStatus('${id}', 'Entregue')" class="bg-green-600 text-white px-2">Concluir</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.mudarStatus = async (id, status) => await updateDoc(doc(db, "pedidos", id), { status });

        // --- MOTOBOY ---
        function ouvirEntregasMotoboy(email) {
            onSnapshot(query(collection(db, "pedidos"), where("motoboy", "==", email)), (snap) => {
                const lista = document.getElementById('lista-entregas-moto');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    lista.innerHTML += `<div class="p-3 border">
                        <p>${p.entrega}</p>
                        <button onclick="mudarStatus('${d.id}', 'Entregue')" class="bg-green-600 text-white p-1 mt-2">Finalizar Entrega</button>
                    </div>`;
                });
            });
        }

        // --- CLIENTE / CARDÁPIO ---
        function ouvirCardapio() {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const lista = document.getElementById('cardapio-lista');
                lista.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    lista.innerHTML += `<div class="p-2 border flex justify-between">
                        <span>${p.nome} - R$ ${p.preco}</span>
                        <button onclick="addCarrinho('${p.nome}', ${p.preco})" class="bg-red-600 text-white px-2">Add</button>
                    </div>`;
                });
            });
        }

        window.addCarrinho = (nome, preco) => {
            carrinho.push({nome, preco});
            document.getElementById('lista-carrinho').innerText = carrinho.map(i => i.nome).join(", ");
            let total = carrinho.reduce((a, b) => a + b.preco, 0) + taxaEntrega;
            document.getElementById('total-geral').innerText = "R$ " + total.toFixed(2);
        };

        window.enviarPedidoCompleto = async () => {
            await addDoc(collection(db, "pedidos"), {
                cliente: auth.currentUser.email,
                item: carrinho.map(i => i.nome).join(", "),
                status: "Pendente",
                data: serverTimestamp(),
                motoboy: "",
                entrega: document.getElementById('rua').value || "Retirada"
            });
            alert("Pedido Enviado!");
            carrinho = [];
        };

    </script>
</body>
</html>
