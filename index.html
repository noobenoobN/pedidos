<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Grátis - Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        #chat-box { height: 200px; overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="auth-screen" class="max-w-md mx-auto mt-20 p-6 bg-white rounded shadow">
        <h2 class="text-2xl font-bold mb-4 text-center">Login Delivery</h2>
        <input id="email" type="email" placeholder="E-mail" class="w-full border p-2 mb-2 rounded">
        <input id="senha" type="password" placeholder="Senha" class="w-full border p-2 mb-4 rounded">
        <button onclick="logar()" class="w-full bg-blue-600 text-white p-2 rounded mb-2">Entrar</button>
        <button onclick="cadastrar()" class="w-full bg-gray-400 text-white p-2 rounded">Criar Conta</button>
    </div>

    <div id="main-screen" class="hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <h1 id="user-welcome" class="text-xl font-bold">Carregando...</h1>
            <button onclick="auth.signOut()" class="text-red-500 underline">Sair</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="content-area" class="bg-white p-4 rounded shadow">
                <h3 class="font-bold border-b mb-3 pb-2">Ações</h3>
                <div id="cliente-view" class="hidden">
                    <button onclick="fazerPedido('Hambúrguer G', 25)" class="w-full bg-red-500 text-white p-3 rounded mb-2">Pedir Hambúrguer (R$ 25)</button>
                    <button onclick="fazerPedido('Pizza M', 40)" class="w-full bg-red-500 text-white p-3 rounded">Pedir Pizza (R$ 40)</button>
                </div>
                <div id="admin-view" class="hidden">
                    <p class="text-sm text-gray-500 mb-2">Pedidos Recentes:</p>
                    <div id="lista-pedidos" class="space-y-2"></div>
                </div>
            </div>

            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-bold border-b mb-3 pb-2 text-blue-600">Chat do Pedido</h3>
                <div id="chat-box" class="bg-gray-50 p-2 rounded border mb-2 text-sm">
                    <p class="text-gray-400 text-center">Selecione um pedido ou faça um para falar.</p>
                </div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Mensagem..." class="flex-1 border p-2 rounded">
                    <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 py-2 rounded">-></button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // SUA CONFIGURAÇÃO DO FIREBASE (JÁ INCLUÍDA)
        const firebaseConfig = {
            apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
            authDomain: "sitepedidos.firebaseapp.com",
            projectId: "sitepedidos",
            storageBucket: "sitepedidos.firebasestorage.app",
            messagingSenderId: "812273915392",
            appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH ---
        window.cadastrar = () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            createUserWithEmailAndPassword(auth, email, senha).catch(e => alert(e.message));
        };

        window.logar = () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, email, senha).catch(e => alert(e.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('user-welcome').innerText = `Olá, ${user.email}`;
                
                // Lógica de Admin (Exemplo: se o email contiver 'admin')
                if(user.email.includes('admin')) {
                    document.getElementById('admin-view').classList.remove('hidden');
                    carregarPedidosAdmin();
                } else {
                    document.getElementById('cliente-view').classList.remove('hidden');
                }
                ouvirMensagens();
            } else {
                location.reload(); // Simples reset ao sair
            }
        });

        // --- PEDIDOS ---
        window.fazerPedido = async (item, valor) => {
            await addDoc(collection(db, "pedidos"), {
                cliente: auth.currentUser.email,
                item: item,
                valor: valor,
                criadoEm: serverTimestamp()
            });
            alert("Pedido feito! O Admin verá no chat.");
        };

        function carregarPedidosAdmin() {
            const q = query(collection(db, "pedidos"), orderBy("criadoEm", "desc"));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    lista.innerHTML += `<div class="p-2 border rounded text-sm bg-gray-50">
                        <b>${p.cliente}:</b> ${p.item} (R$ ${p.valor})
                    </div>`;
                });
            });
        }

        // --- CHAT ---
        window.enviarMensagem = async () => {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            await addDoc(collection(db, "mensagens"), {
                user: auth.currentUser.email,
                texto: input.value,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        function ouvirMensagens() {
            const q = query(collection(db, "mensagens"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const cor = m.user.includes('admin') ? 'text-red-600' : 'text-blue-600';
                    box.innerHTML += `<p class="mb-1"> <b class="${cor}">${m.user.split('@')[0]}:</b> ${m.texto} </p>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
