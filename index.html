<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistema de Pedidos</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding-top: 100px;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      width: 270px;
      margin: 5px;
      border: none;
      background: orange;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>
<body>

<h2>Sistema de Pedidos</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Senha">

<button onclick="registrar()">Registrar</button>
<button onclick="entrar()">Entrar</button>

<p id="msg"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore } 
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
    authDomain: "sitepedidos.firebaseapp.com",
    projectId: "sitepedidos",
    storageBucket: "sitepedidos.firebasestorage.app",
    messagingSenderId: "812273915392",
    appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const msg = document.getElementById("msg");

  window.registrar = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.style.color = "green";
        msg.innerText = "Usuário registrado com sucesso!";
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = error.message;
      });
  }

  window.entrar = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        msg.style.color = "green";
        msg.innerText = "Login realizado com sucesso!";
      })
      .catch(error => {
        msg.style.color = "red";
        msg.innerText = error.message;
      });
  }

</script>

</body>
</html>
