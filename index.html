<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Meu Delivery - Mobile Friendly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ajustes para o site não parecer estático */
        .hidden { display: none; }
        
        /* Chat adaptável */
        #chat-box { 
            height: 300px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
        }

        /* Menu de abas deslizante no celular */
        .tab-container {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            border-bottom: 2px solid #e5e7eb;
        }
        .tab-container::-webkit-scrollbar { display: none; } /* Esconde barra no Chrome/Safari */

        /* Estilos de Status */
        .status-pendente { color: #dc2626; font-weight: bold; }
        .status-preparando { color: #d97706; font-weight: bold; }
        .status-caminho { color: #2563eb; font-weight: bold; }
        .status-entregue { color: #16a34a; font-weight: bold; }
        .status-cancelado { color: #4b5563; font-weight: bold; text-decoration: line-through; }

        /* MODO DE IMPRESSÃO - OTIMIZADO PARA MINI IMPRESSORAS (58mm/80mm) */
        @media print {
            body * { visibility: hidden; }
            .imprimir-este, .imprimir-este * { visibility: visible !important; }
            .imprimir-este { 
                position: absolute; left: 0; top: 0; width: 100%; 
                font-family: monospace; font-size: 12px; color: black !important;
            }
            .no-print { display: none !important; }
        }

        /* Ajuste de botões para não quebrarem layout */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-group button {
            flex: 1 1 auto; /* Faz o botão crescer ou diminuir conforme o espaço */
            min-width: 120px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl">
            <h2 class="text-3xl font-extrabold mb-8 text-center text-red-600">Delivery App</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="E-mail" class="w-full border-2 p-4 rounded-xl focus:border-red-500 outline-none transition">
                <input id="senha" type="password" placeholder="Senha" class="w-full border-2 p-4 rounded-xl focus:border-red-500 outline-none transition">
                <button onclick="logar()" class="w-full bg-red-600 text-white font-bold p-4 rounded-xl hover:bg-red-700 active:scale-95 transition">Entrar</button>
                <button onclick="cadastrar()" class="w-full text-gray-500 text-sm hover:underline">Criar Nova Conta</button>
            </div>
        </div>
    </div>

    <div id="main-screen" class="hidden min-h-screen flex flex-col">
        <nav class="bg-red-600 text-white p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center">
            <h1 class="font-bold text-lg truncate pr-2" id="user-welcome">Painel</h1>
            <button onclick="sair()" class="bg-red-800 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider">Sair</button>
        </nav>

        <main class="max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-8 space-y-6">
                
                <div id="cliente-view" class="hidden bg-white p-4 md:p-6 rounded-2xl shadow-sm">
                    <h3 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Nosso Cardápio</h3>
                    <div id="cardapio-lista" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    
                    <div class="mt-8 bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-200">
                        <h4 class="font-bold mb-4 flex items-center gap-2">🛒 Seu Carrinho</h4>
                        <div id="lista-carrinho" class="text-sm text-gray-600 space-y-2 mb-4"></div>
                        
                        <div class="space-y-3">
                            <select id="opcao-entrega" onchange="toggleEndereco()" class="w-full p-3 rounded-lg border bg-white">
                                <option value="Sim">Vou precisar de Entrega</option>
                                <option value="Não">Vou buscar no local</option>
                            </select>
                            
                            <div id="campos-endereco" class="grid grid-cols-1 gap-2">
                                <input id="cep" type="text" placeholder="CEP" onblur="buscarCEP()" class="w-full p-3 border rounded-lg">
                                <div class="flex gap-2">
                                    <input id="rua" type="text" placeholder="Endereço" class="flex-1 p-3 border rounded-lg bg-gray-100" readonly>
                                    <input id="num" type="text" placeholder="Nº" onblur="recalcularFrete()" class="w-20 p-3 border rounded-lg">
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 p-4 bg-white rounded-xl shadow-inner text-right">
                            <p class="text-xs text-gray-400">Subtotal: <span id="resumo-subtotal">R$ 0.00</span></p>
                            <p class="text-xs text-blue-500">Taxa: <span id="resumo-taxa">R$ 0.00</span></p>
                            <p class="text-xl font-black text-red-600">Total: <span id="resumo-carrinho">R$ 0.00</span></p>
                        </div>
                        <button onclick="enviarPedidoCompleto()" class="w-full mt-4 bg-green-600 text-white p-4 rounded-xl font-black text-lg shadow-lg active:scale-95 transition">FINALIZAR PEDIDO</button>
                    </div>
                </div>

                <div id="admin-view" class="hidden bg-white p-4 rounded-2xl shadow-sm">
                    <div class="tab-container mb-6">
                        <button onclick="tabAdmin('pedidos')" id="btn-tab-pedidos" class="px-6 py-3 font-bold border-b-4 border-red-600 text-red-600">Pedidos</button>
                        <button onclick="tabAdmin('cardapio')" id="btn-tab-cardapio" class="px-6 py-3 font-bold text-gray-400">Cardápio</button>
                        <button onclick="tabAdmin('motoboys')" id="btn-tab-motoboys" class="px-6 py-3 font-bold text-gray-400">Motoboys</button>
                        <button onclick="tabAdmin('config')" id="btn-tab-config" class="px-6 py-3 font-bold text-gray-400">Config</button>
                    </div>

                    <div id="tab-pedidos" class="space-y-4">
                        <div id="lista-pedidos" class="grid grid-cols-1 gap-4"></div>
                    </div>
                    
                    <div id="tab-cardapio" class="hidden">
                         <div class="bg-gray-50 p-4 rounded-xl mb-6 flex flex-col gap-3">
                             <input id="prod-nome" type="text" placeholder="Nome do Produto" class="p-3 border rounded-lg">
                             <input id="prod-preco" type="number" placeholder="Preço R$" class="p-3 border rounded-lg">
                             <button onclick="salvarProduto()" class="bg-green-600 text-white p-3 rounded-lg font-bold">Adicionar ao Cardápio</button>
                         </div>
                         <div id="admin-cardapio-lista" class="space-y-2"></div>
                    </div>
                    </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div id="status-cliente-container" class="bg-white p-4 rounded-2xl shadow-sm">
                    <h4 class="font-bold text-gray-700 mb-4 flex justify-between">
                        Acompanhar Pedido
                        <button onclick="limparPedidosConcluidos()" class="text-[10px] text-gray-400 underline">Limpar</button>
                    </h4>
                    <div id="meus-pedidos-status" class="text-sm space-y-3"></div>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm flex flex-col h-[450px]">
                    <h4 class="font-bold text-blue-600 mb-2">Suporte Online</h4>
                    <div id="chat-box" class="flex-1 bg-gray-50 rounded-xl p-3 mb-3 text-sm border-inner"></div>
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="Dúvida?" class="flex-1 p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                        <button onclick="enviarMensagem()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Importe aqui suas bibliotecas do Firebase igual ao código anterior...
        // Mantenha suas funções de 'logar', 'ouvirPedidosAdmin', etc. 
        // O importante foi a mudança estrutural das 'DIVS' e 'CLASSES' acima.
        
        // Dica: Na função de listar pedidos no admin, utilize a classe "btn-group" 
        // para os botões de Imprimir/Preparar/Cancelar para que eles se ajustem no celular.
    </script>
</body>
</html>
