<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<style>
body{
  background:#ddd3c7;
  font-family:Arial;
  padding:20px;
}
.container{
  max-width:400px;
  margin:auto;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  width:100%;
  padding:12px;
  margin:5px 0;
  background:#ff6a00;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.9;
}
#areaPedidos{
  display:none;
}
</style>
</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="areaLogin">
<h2>Sistema de Pedidos</h2>

<input type="email" id="email" placeholder="Digite seu email">
<input type="password" id="senha" placeholder="Digite sua senha">

<button onclick="registrar()">Registrar</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<!-- AREA APÓS LOGIN -->
<div id="areaPedidos">
<h2>Bem-vindo!</h2>
<p id="usuarioEmail"></p>

<input type="text" id="produtoPedido" placeholder="Digite o produto">
<button onclick="fazerPedido()">Fazer Pedido</button>

<div id="listaPedidos"></div>

<button onclick="sair()">Sair</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioAtual = null;

window.registrar = function(){
  const email = emailInput.value;
  const senha = senhaInput.value;

  createUserWithEmailAndPassword(auth, email, senha)
  .catch(error => msg.innerText = error.message);
}

window.login = function(){
  const email = emailInput.value;
  const senha = senhaInput.value;

  signInWithEmailAndPassword(auth, email, senha)
  .catch(error => msg.innerText = error.message);
}

window.sair = function(){
  signOut(auth);
}

window.fazerPedido = async function(){
  const produto = produtoPedido.value;

  if(!produto) return;

  await addDoc(collection(db, "pedidos"), {
    produto: produto,
    usuario: usuarioAtual.email
  });

  produtoPedido.value = "";
}

// 🔥 AQUI ESTÁ O SEGREDO
onAuthStateChanged(auth, (user)=>{
  if(user){
    usuarioAtual = user;

    areaLogin.style.display = "none";
    areaPedidos.style.display = "block";
    usuarioEmail.innerText = "Logado como: " + user.email;

    carregarPedidos();
  }else{
    areaLogin.style.display = "block";
    areaPedidos.style.display = "none";
  }
});

function carregarPedidos(){
  onSnapshot(collection(db, "pedidos"), (snapshot)=>{
    listaPedidos.innerHTML = "";

    snapshot.forEach(doc=>{
      const pedido = doc.data();

      if(pedido.usuario === usuarioAtual.email){
        listaPedidos.innerHTML += `
          <p>Pedido: ${pedido.produto}</p>
        `;
      }
    });
  });
}
</script>

</body>
</html>
