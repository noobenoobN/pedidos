<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Completo</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- LOGIN -->
<div id="authBox" class="bg-white p-6 rounded-xl shadow-md w-80">
  <h2 class="text-2xl font-bold text-center mb-4">Login</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full p-2 mb-2 border rounded">

  <input id="senha" type="password" placeholder="Senha"
    class="w-full p-2 mb-3 border rounded">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-2 rounded mb-2">
    Entrar
  </button>

  <button onclick="cadastrar()"
    class="w-full bg-green-600 text-white p-2 rounded">
    Cadastrar
  </button>

  <p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden bg-white p-6 rounded-xl shadow-md w-96">
  <h1 class="text-xl font-bold mb-4">Painel Admin 👑</h1>

  <h2 class="font-bold">Adicionar Produto</h2>
  <input id="nomeProduto" placeholder="Nome"
    class="w-full p-2 border rounded mt-2">
  <input id="precoProduto" placeholder="Preço"
    class="w-full p-2 border rounded mt-2">
  <button onclick="addProduto()"
    class="w-full bg-blue-600 text-white p-2 rounded mt-2">
    Salvar Produto
  </button>

  <h2 class="font-bold mt-6">Pedidos</h2>
  <div id="listaPedidos" class="mt-2"></div>

  <button onclick="logout()"
    class="mt-4 bg-red-500 text-white p-2 rounded w-full">
    Sair
  </button>
</div>

<!-- CLIENTE -->
<div id="clientePanel" class="hidden bg-white p-6 rounded-xl shadow-md w-96">
  <h1 class="text-xl font-bold mb-4">Painel Cliente 🛒</h1>

  <h2 class="font-bold">Produtos</h2>
  <div id="listaProdutos" class="mt-2"></div>

  <button onclick="logout()"
    class="mt-4 bg-red-500 text-white p-2 rounded w-full">
    Sair
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authBox = document.getElementById("authBox");
const adminPanel = document.getElementById("adminPanel");
const clientePanel = document.getElementById("clientePanel");

window.cadastrar = async function() {
  const email = email.value;
  const senha = senha.value;

  const cred = await createUserWithEmailAndPassword(auth, email, senha);

  await setDoc(doc(db, "usuarios", cred.user.uid), {
    email: email,
    role: "cliente"
  });

  alert("Conta criada!");
};

window.login = async function() {
  await signInWithEmailAndPassword(auth, email.value, senha.value);
};

window.logout = function() {
  signOut(auth);
};

window.addProduto = async function() {
  await addDoc(collection(db, "produtos"), {
    nome: nomeProduto.value,
    preco: precoProduto.value
  });

  nomeProduto.value = "";
  precoProduto.value = "";
};

function carregarProdutos() {
  onSnapshot(collection(db, "produtos"), (snapshot) => {
    listaProdutos.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const produto = docSnap.data();
      listaProdutos.innerHTML += `
        <div class="border p-2 rounded mb-2">
          ${produto.nome} - R$ ${produto.preco}
          <button onclick="fazerPedido('${produto.nome}')"
            class="bg-green-500 text-white px-2 py-1 rounded ml-2">
            Pedir
          </button>
        </div>
      `;
    });
  });
}

window.fazerPedido = async function(nome) {
  await addDoc(collection(db, "pedidos"), {
    produto: nome,
    usuario: auth.currentUser.email
  });

  alert("Pedido enviado!");
};

function carregarPedidos() {
  onSnapshot(collection(db, "pedidos"), (snapshot) => {
    listaPedidos.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const pedido = docSnap.data();
      listaPedidos.innerHTML += `
        <div class="border p-2 rounded mb-2">
          ${pedido.usuario} pediu ${pedido.produto}
        </div>
      `;
    });
  });
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docSnap = await getDoc(doc(db, "usuarios", user.uid));

    authBox.classList.add("hidden");

    if (docSnap.exists() && docSnap.data().role === "admin") {
      adminPanel.classList.remove("hidden");
      clientePanel.classList.add("hidden");
      carregarPedidos();
    } else {
      clientePanel.classList.remove("hidden");
      adminPanel.classList.add("hidden");
      carregarProdutos();
    }
  } else {
    authBox.classList.remove("hidden");
    adminPanel.classList.add("hidden");
    clientePanel.classList.add("hidden");
  }
});
</script>

</body>
</html>
