<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Pedidos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow-md w-80">
  <h2 class="text-2xl font-bold text-center mb-4">Sistema</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full p-2 mb-2 border rounded">

  <input id="senha" type="password" placeholder="Senha"
    class="w-full p-2 mb-3 border rounded">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white p-2 rounded mb-2">
    Entrar
  </button>

  <button onclick="cadastrar()"
    class="w-full bg-green-600 text-white p-2 rounded">
    Cadastrar
  </button>

  <p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgqjGYaV7rmgLMPB-Y4DcvgVkg82GFt0I",
  authDomain: "sitepedidos.firebaseapp.com",
  projectId: "sitepedidos",
  storageBucket: "sitepedidos.firebasestorage.app",
  messagingSenderId: "812273915392",
  appId: "1:812273915392:web:9fc70d67ac717a11ca6ae5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.cadastrar = async function() {
  const email = email.value;
  const senha = senha.value;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, senha);

    await setDoc(doc(db, "usuarios", cred.user.uid), {
      email: email,
      role: "cliente",
      criadoEm: new Date()
    });

    alert("Conta criada!");
  } catch (error) {
    msg.innerText = error.message;
  }
};

window.login = async function() {
  const emailValue = document.getElementById("email").value;
  const senhaValue = document.getElementById("senha").value;

  try {
    const cred = await signInWithEmailAndPassword(auth, emailValue, senhaValue);
    const user = cred.user;

    const docRef = doc(db, "usuarios", user.uid);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const dados = docSnap.data();

      if (dados.role === "admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "cliente.html";
      }
    }

  } catch (error) {
    msg.innerText = "Email ou senha inválidos";
  }
};
</script>

</body>
</html>
